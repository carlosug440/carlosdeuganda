<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Daily Devotion | Christian Scripture & Prayer</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* Navigation Bar */
        .nav-bar {
            background: white;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 20px rgba(0,0,0,0.05);
            border-radius: 50px;
            margin-bottom: 30px;
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        .nav-bar h2 {
            color: #3b82f6;
            font-size: 24px;
        }

        .nav-bar h2 i {
            color: #fbbf24;
            margin-right: 8px;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: #1e293b;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #3b82f6;
        }

        /* Main Container */
        .devotion-container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Date Navigation */
        .date-nav {
            background: white;
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .nav-btn {
            background: #3b82f6;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn:hover {
            background: #2563eb;
            transform: scale(1.02);
        }

        .date-picker {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .date-picker input {
            padding: 12px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
        }

        .today-btn {
            background: #fbbf24;
            color: #1e293b;
        }

        .today-btn:hover {
            background: #f59e0b;
            color: white;
        }

        /* Devotion Card */
        .devotion-card {
            background: white;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .verse-header {
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            padding: 40px 30px;
            text-align: center;
            color: white;
        }

        .verse-header h3 {
            font-size: 18px;
            opacity: 0.9;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .verse-text {
            font-size: 28px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 20px;
        }

        .verse-reference {
            font-size: 18px;
            opacity: 0.9;
        }

        .devotion-content {
            padding: 40px;
        }

        .devotion-title {
            font-size: 32px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 20px;
        }

        .devotion-message {
            font-size: 18px;
            line-height: 1.8;
            color: #334155;
            margin-bottom: 30px;
        }

        .prayer-section {
            background: #fef9e6;
            padding: 25px;
            border-radius: 25px;
            margin: 25px 0;
            border-left: 4px solid #fbbf24;
        }

        .prayer-section h4 {
            color: #fbbf24;
            font-size: 20px;
            margin-bottom: 12px;
        }

        .prayer-section p {
            color: #475569;
            font-size: 16px;
            line-height: 1.7;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .action-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .favorite-btn {
            background: #fef3c7;
            color: #d97706;
        }

        .favorite-btn.active {
            background: #fbbf24;
            color: white;
        }

        .whatsapp-btn {
            background: #25D366;
            color: white;
        }

        .twitter-btn {
            background: #000000;
            color: white;
        }

        .twitter-btn i {
            color: #1DA1F2;
        }

        .audio-btn {
            background: #8b5cf6;
            color: white;
        }

        .action-btn:hover {
            transform: translateY(-2px);
        }

        /* Category Badge */
        .category-badge {
            display: inline-block;
            padding: 6px 16px;
            background: #e0e7ff;
            color: #3b82f6;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        /* Favorites Section */
        .favorites-section {
            background: white;
            border-radius: 30px;
            padding: 30px;
            margin-top: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .favorites-section h3 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #1e293b;
        }

        .favorite-item {
            padding: 15px;
            border-bottom: 1px solid #e2e8f0;
            cursor: pointer;
            transition: 0.3s;
        }

        .favorite-item:hover {
            background: #f8fafc;
            transform: translateX(5px);
        }

        .favorite-verse {
            font-weight: 600;
            color: #3b82f6;
        }

        /* Share Modal */
        .share-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }

        .share-modal.active {
            opacity: 1;
            visibility: visible;
        }

        .share-modal-content {
            background: white;
            border-radius: 30px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .share-modal-content h3 {
            margin-bottom: 20px;
            color: #1e293b;
        }

        .share-options {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 20px 0;
        }

        .share-option {
            padding: 15px 25px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }

        .share-option.whatsapp {
            background: #25D366;
            color: white;
        }

        .share-option.twitter {
            background: #000000;
            color: white;
        }

        .share-option.whatsapp:hover, .share-option.twitter:hover {
            transform: scale(1.05);
        }

        .close-modal {
            margin-top: 15px;
            padding: 10px 20px;
            background: #e2e8f0;
            border: none;
            border-radius: 40px;
            cursor: pointer;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .verse-text {
                font-size: 20px;
            }
            .devotion-title {
                font-size: 24px;
            }
            .devotion-message {
                font-size: 16px;
            }
            .date-nav {
                flex-direction: column;
            }
            .nav-bar {
                flex-direction: column;
                gap: 15px;
                border-radius: 30px;
            }
            .action-buttons {
                flex-direction: column;
            }
            .action-btn {
                justify-content: center;
            }
        }
    </style>
</head>
