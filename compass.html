<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Magnetic Compass | Real North Finder</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        min-height: 100vh;
        background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Segoe UI', system-ui, sans-serif;
        padding: 20px;
    }

    .compass-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        width: 100%;
        max-width: 450px;
    }

    .compass-card {
        background: rgba(20, 28, 40, 0.9);
        backdrop-filter: blur(20px);
        border-radius: 50px;
        padding: 20px;
        box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.2);
        width: 100%;
    }

    .compass-container {
        position: relative;
        width: 100%;
        aspect-ratio: 1 / 1;
        max-width: 350px;
        margin: 0 auto;
    }

    .compass-outer {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: linear-gradient(135deg, #2a3348, #1a1f2e);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5), inset 0 2px 5px rgba(255,255,255,0.1);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .compass-face {
        width: 94%;
        height: 94%;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #1e2a3a, #0a0f18);
        position: relative;
        overflow: visible;
    }

    .compass-dial {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        transition: transform 0.1s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        will-change: transform;
    }

    .needle-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        z-index: 20;
    }

    .needle {
        position: relative;
        width: 8px;
        height: 42%;
        background: linear-gradient(180deg, #ff4444, #aa2222);
        border-radius: 4px;
        transform-origin: bottom center;
        margin-top: -42%;
        box-shadow: 0 0 10px rgba(255, 68, 68, 0.6);
    }

    .needle::before {
        content: "▼";
        position: absolute;
        top: -20px;
        left: 50%;
        transform: translateX(-50%);
        color: #ff4444;
        font-size: 18px;
    }

    .needle-center {
        position: absolute;
        width: 28px;
        height: 28px;
        background: radial-gradient(circle, #ffdd99, #ccaa66);
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        box-shadow: 0 0 8px rgba(0,0,0,0.5);
        z-index: 22;
        border: 2px solid #ffaa44;
    }

    .north-badge {
        position: absolute;
        top: -15px;
        left: 50%;
        transform: translateX(-50%);
        background: #ff4444;
        color: white;
        padding: 4px 14px;
        border-radius: 30px;
        font-size: 12px;
        font-weight: bold;
        z-index: 25;
        white-space: nowrap;
        box-shadow: 0 2px 8px rgba(255,68,68,0.4);
    }

    .dir-label {
        position: absolute;
        font-weight: bold;
        font-size: 20px;
        text-shadow: 0 2px 4px black;
        background: rgba(0,0,0,0.4);
        padding: 4px 10px;
        border-radius: 30px;
        backdrop-filter: blur(4px);
    }
    .n-label { top: 8%; left: 50%; transform: translateX(-50%); color: #ff8888; }
    .e-label { top: 50%; right: 5%; transform: translateY(-50%); color: #88ffaa; }
    .s-label { bottom: 8%; left: 50%; transform: translateX(-50%); color: #ffaa66; }
    .w-label { top: 50%; left: 5%; transform: translateY(-50%); color: #88ffaa; }

    .info-panel {
        background: rgba(10, 20, 35, 0.9);
        backdrop-filter: blur(12px);
        border-radius: 40px;
        padding: 18px 24px;
        text-align: center;
        width: 100%;
        border: 1px solid rgba(255,255,255,0.15);
    }

    .heading {
        font-size: 52px;
        font-weight: 800;
        font-family: monospace;
        background: linear-gradient(135deg, #fff, #88aaff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }

    .direction {
        font-size: 26px;
        font-weight: 700;
        color: #ffaa66;
        margin-top: 5px;
        letter-spacing: 2px;
    }

    .status {
        font-size: 12px;
        margin-top: 12px;
        padding: 8px 12px;
        background: rgba(0,0,0,0.5);
        border-radius: 30px;
        display: inline-block;
        color: #aaddff;
    }

    button {
        background: linear-gradient(135deg, #4a90e2, #2c5aa6);
        border: none;
        padding: 14px 28px;
        border-radius: 50px;
        color: white;
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
        width: 100%;
        max-width: 280px;
        transition: transform 0.1s;
    }

    button:active {
        transform: scale(0.98);
    }

    .help-text {
        font-size: 12px;
        color: #ffaa66;
        background: rgba(0,0,0,0.5);
        padding: 12px;
        border-radius: 30px;
        text-align: center;
        line-height: 1.5;
    }

    .test-controls {
        display: flex;
        gap: 10px;
        margin-top: 10px;
        justify-content: center;
        flex-wrap: wrap;
    }

    .test-btn {
        background: rgba(74, 144, 226, 0.3);
        padding: 8px 16px;
        font-size: 12px;
        max-width: none;
        width: auto;
    }

    @media (max-width: 480px) {
        .heading { font-size: 38px; }
        .direction { font-size: 20px; }
        .dir-label { font-size: 14px; padding: 2px 6px; }
        .test-btn { padding: 6px 12px; font-size: 10px; }
    }
</style>
</head>
<body>

<div class="compass-wrapper">
    <div class="compass-card">
        <div class="compass-container">
            <div class="compass-outer">
                <div class="compass-face">
                    <div class="compass-dial" id="compassDial">
                        <div id="ticksContainer" style="position:relative; width:100%; height:100%;"></div>
                        <div class="dir-label n-label">N</div>
                        <div class="dir-label e-label">E</div>
                        <div class="dir-label s-label">S</div>
                        <div class="dir-label w-label">W</div>
                    </div>
                    <div class="needle-container">
                        <div class="needle"></div>
                        <div class="needle-center"></div>
                    </div>
                    <div class="north-badge">⚡ NORTH</div>
                </div>
            </div>
        </div>
    </div>

    <div class="info-panel">
        <div class="heading" id="headingValue">0°</div>
        <div class="direction" id="directionValue">NORTH</div>
        <div class="status" id="statusText">🎯 Tap button to start compass</div>
    </div>

    <button id="startCompassBtn">🧭 START COMPASS</button>
    <div class="test-controls">
        <button id="testNorthBtn" class="test-btn">⬆️ Test North</button>
        <button id="testEastBtn" class="test-btn">➡️ Test East</button>
        <button id="testSouthBtn" class="test-btn">⬇️ Test South</button>
        <button id="testWestBtn" class="test-btn">⬅️ Test West</button>
    </div>
    <div class="help-text" id="helpText">
        💡 Click "START COMPASS" to activate<br>
        📱 On iPhone: Allow motion access when prompted<br>
        🖱️ On Computer: Use test buttons to see compass work
    </div>
</div>

<script>
    // DOM elements
    const compassDial = document.getElementById('compassDial');
    const headingValue = document.getElementById('headingValue');
    const directionValue = document.getElementById('directionValue');
    const statusText = document.getElementById('statusText');
    const startBtn = document.getElementById('startCompassBtn');
    const helpText = document.getElementById('helpText');
    const ticksContainer = document.getElementById('ticksContainer');

    let currentHeading = 0;
    let isCompassActive = false;
    let sensorActive = false;
    let animationId = null;

    // Generate degree ticks
    function generateTicks() {
        ticksContainer.innerHTML = '';
        
        for (let deg = 0; deg < 360; deg += 10) {
            const isMajor = deg % 30 === 0;
            const isCardinal = deg % 90 === 0;
            
            const tick = document.createElement('div');
            const radius = 46;
            const radian = (deg - 90) * Math.PI / 180;
            const x = 50 + radius * Math.cos(radian);
            const y = 50 + radius * Math.sin(radian);
            
            tick.style.position = 'absolute';
            tick.style.left = `${x}%`;
            tick.style.top = `${y}%`;
            tick.style.transform = `translate(-50%, -50%) rotate(${deg}deg)`;
            tick.style.width = isMajor ? '3px' : '2px';
            tick.style.height = isMajor ? '14px' : '8px';
            tick.style.backgroundColor = isCardinal ? '#ffaa66' : (isMajor ? '#aaa' : '#666');
            tick.style.borderRadius = '2px';
            
            if (isMajor && !isCardinal) {
                const num = document.createElement('span');
                num.textContent = deg;
                num.style.position = 'absolute';
                num.style.left = '50%';
                num.style.top = '18px';
                num.style.transform = 'translateX(-50%)';
                num.style.fontSize = '8px';
                num.style.color = '#aaa';
                tick.appendChild(num);
            }
            
            ticksContainer.appendChild(tick);
        }
    }

    // Update compass display
    function updateCompass(heading) {
        if (!compassDial) return;
        // Rotate dial so North aligns with red needle
        compassDial.style.transform = `rotate(${-heading}deg)`;
        
        const rounded = Math.round(heading);
        headingValue.textContent = `${rounded}°`;
        
        const fullNames = ['NORTH', 'NORTH-NORTHEAST', 'NORTHEAST', 'EAST-NORTHEAST', 
                          'EAST', 'EAST-SOUTHEAST', 'SOUTHEAST', 'SOUTH-SOUTHEAST',
                          'SOUTH', 'SOUTH-SOUTHWEST', 'SOUTHWEST', 'WEST-SOUTHWEST',
                          'WEST', 'WEST-NORTHWEST', 'NORTHWEST', 'NORTH-NORTHWEST'];
        
        const idx = Math.round((heading + 11.25) % 360 / 22.5);
        directionValue.textContent = fullNames[idx % 16];
    }

    // Set heading manually (for testing)
    function setHeading(heading) {
        currentHeading = heading % 360;
        updateCompass(currentHeading);
        if (!sensorActive) {
            statusText.innerHTML = '🎮 Test mode - Compass showing ' + Math.round(heading) + '°';
        }
    }

    // Smooth heading update from sensors
    let filteredHeading = null;
    function updateHeading(newHeading) {
        if (filteredHeading === null) {
            filteredHeading = newHeading;
        } else {
            let diff = newHeading - filteredHeading;
            if (diff > 180) diff -= 360;
            if (diff < -180) diff += 360;
            filteredHeading += diff * 0.4;
            if (filteredHeading >= 360) filteredHeading -= 360;
            if (filteredHeading < 0) filteredHeading += 360;
        }
        updateCompass(filteredHeading);
        return filteredHeading;
    }

    // Device orientation handler
    function handleOrientation(event) {
        let heading = null;
        
        // iOS
        if (event.webkitCompassHeading !== undefined) {
            heading = event.webkitCompassHeading;
            if (!sensorActive) {
                sensorActive = true;
                isCompassActive = true;
                statusText.innerHTML = '✅ Compass ACTIVE! North is at the red needle';
                statusText.style.background = 'rgba(100,200,100,0.3)';
                helpText.innerHTML = '📍 The red needle points to MAGNETIC NORTH. Rotate your device!';
            }
        }
        // Android with absolute orientation
        else if (event.absolute === true && event.alpha !== null) {
            heading = event.alpha;
            if (!sensorActive) {
                sensorActive = true;
                isCompassActive = true;
                statusText.innerHTML = '✅ Compass ACTIVE! North is at the red needle';
                statusText.style.background = 'rgba(100,200,100,0.3)';
                helpText.innerHTML = '📍 The red needle points to NORTH. Rotate your device!';
            }
        }
        
        if (heading !== null && !isNaN(heading)) {
            heading = heading % 360;
            if (heading < 0) heading += 360;
            updateHeading(heading);
        }
    }

    // Request permission and start compass (iOS)
    async function startCompass() {
        // Check if iOS
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        
        if (isIOS && typeof DeviceOrientationEvent !== 'undefined' && 
            typeof DeviceOrientationEvent.requestPermission === 'function') {
            
            statusText.innerHTML = '📱 Requesting compass permission...';
            helpText.innerHTML = 'Please tap "Allow" when prompted to enable compass';
            
            try {
                const permission = await DeviceOrientationEvent.requestPermission();
                if (permission === 'granted') {
                    window.addEventListener('deviceorientation', handleOrientation);
                    window.addEventListener('deviceorientationabsolute', handleOrientation);
                    statusText.innerHTML = '✅ Compass enabled! Rotate your device';
                    helpText.innerHTML = '🔄 The red needle points to NORTH. Move your device to see it work!';
                } else {
                    statusText.innerHTML = '❌ Permission denied. Cannot access compass.';
                    helpText.innerHTML = 'To enable: Settings → Safari → Motion & Orientation → Allow, then refresh';
                }
            } catch (err) {
                console.error(err);
                statusText.innerHTML = '⚠️ Error requesting permission';
                helpText.innerHTML = 'Please check device settings and try again';
            }
        } 
        // Android / Other
        else if ('DeviceOrientationEvent' in window) {
            window.addEventListener('deviceorientation', handleOrientation);
            window.addEventListener('deviceorientationabsolute', handleOrientation);
            statusText.innerHTML = '🧭 Compass starting... Rotate your device';
            helpText.innerHTML = '🔄 Move your device in a figure-8 pattern to calibrate. The red needle points NORTH!';
            
            // Check if we get data after a few seconds
            setTimeout(() => {
                if (!sensorActive) {
                    statusText.innerHTML = '⚠️ No sensor data yet. Try moving your device in a figure-8 pattern';
                    helpText.innerHTML = '🔄 Move your phone in a figure-8 motion to activate the magnetometer';
                }
            }, 3000);
        } 
        else {
            statusText.innerHTML = '❌ Device orientation not supported';
            helpText.innerHTML = 'Your browser does not support compass sensors. Use test buttons below.';
        }
        
        isCompassActive = true;
    }

    // Test buttons for desktop / troubleshooting
    function setupTestButtons() {
        document.getElementById('testNorthBtn').onclick = () => setHeading(0);
        document.getElementById('testEastBtn').onclick = () => setHeading(90);
        document.getElementById('testSouthBtn').onclick = () => setHeading(180);
        document.getElementById('testWestBtn').onclick = () => setHeading(270);
    }

    // Create a manual rotation demo for desktop (shows compass moving)
    let manualRotation = 0;
    let isRotating = false;
    
    function startManualRotation() {
        if (isRotating) return;
        isRotating = true;
        
        let angle = 0;
        const interval = setInterval(() => {
            if (!sensorActive && isCompassActive) {
                angle = (angle + 5) % 360;
                setHeading(angle);
            }
        }, 50);
        
        // Stop after 10 seconds if no sensor
        setTimeout(() => {
            if (!sensorActive) {
                clearInterval(interval);
                isRotating = false;
            }
        }, 10000);
    }

    // Initialize
    function init() {
        generateTicks();
        setupTestButtons();
        updateCompass(0);
        
        // Start button handler
        startBtn.onclick = () => {
            startCompass();
            startManualRotation(); // This will animate the compass until sensors kick in
        };
        
        // Auto-start on mobile (but with user gesture requirement)
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        if (isMobile) {
            helpText.innerHTML = '📱 Tap "START COMPASS" and allow permission when prompted';
        } else {
            helpText.innerHTML = '💻 Desktop mode: Use test buttons to see compass work, or click START and move mouse';
            // Add mouse tracking for desktop
            window.addEventListener('mousemove', (e) => {
                if (!sensorActive && isCompassActive) {
                    const angle = (e.clientX / window.innerWidth) * 360;
                    setHeading(angle);
                }
            });
        }
    }

    // Animation loop
    function animate() {
        animationId = requestAnimationFrame(animate);
    }
    animate();
    
    init();
    
    window.addEventListener('beforeunload', () => {
        if (animationId) cancelAnimationFrame(animationId);
    });
    
    console.log('Compass ready - Click START COMPASS to begin');
</script>
</body>
   </html>
                                                                     </html>
