<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Ultra-Fast Digital Compass | Instant Response</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        min-height: 100vh;
        background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Segoe UI', system-ui, sans-serif;
        padding: 20px;
    }

    .compass-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        width: 100%;
        max-width: 500px;
    }

    .compass-card {
        background: rgba(20, 28, 40, 0.95);
        backdrop-filter: blur(20px);
        border-radius: 60px;
        padding: 20px;
        box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.2);
        width: 100%;
    }

    .compass-container {
        position: relative;
        width: 100%;
        aspect-ratio: 1 / 1;
        max-width: 380px;
        margin: 0 auto;
        cursor: pointer;
    }

    .compass-outer {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: linear-gradient(135deg, #2a3348, #1a1f2e);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5), inset 0 2px 5px rgba(255,255,255,0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.1s;
    }

    .compass-face {
        width: 94%;
        height: 94%;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #1e2a3a, #0a0f18);
        position: relative;
        overflow: visible;
    }

    .compass-dial {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        transition: transform 0.05s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        will-change: transform;
    }

    .needle-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        z-index: 20;
    }

    .needle {
        position: relative;
        width: 8px;
        height: 42%;
        background: linear-gradient(180deg, #ff4444, #aa2222);
        border-radius: 4px;
        transform-origin: bottom center;
        margin-top: -42%;
        box-shadow: 0 0 10px rgba(255, 68, 68, 0.6);
    }

    .needle::before {
        content: "▼";
        position: absolute;
        top: -20px;
        left: 50%;
        transform: translateX(-50%);
        color: #ff4444;
        font-size: 18px;
    }

    .needle-center {
        position: absolute;
        width: 32px;
        height: 32px;
        background: radial-gradient(circle, #ffdd99, #ccaa66);
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        box-shadow: 0 0 8px rgba(0,0,0,0.5);
        z-index: 22;
        border: 2px solid #ffaa44;
    }

    .north-badge {
        position: absolute;
        top: -15px;
        left: 50%;
        transform: translateX(-50%);
        background: #ff4444;
        color: white;
        padding: 4px 14px;
        border-radius: 30px;
        font-size: 12px;
        font-weight: bold;
        z-index: 25;
        white-space: nowrap;
        box-shadow: 0 2px 8px rgba(255,68,68,0.4);
    }

    .dir-label {
        position: absolute;
        font-weight: bold;
        font-size: 22px;
        text-shadow: 0 2px 4px black;
        background: rgba(0,0,0,0.5);
        padding: 4px 12px;
        border-radius: 30px;
        backdrop-filter: blur(4px);
    }
    .n-label { top: 6%; left: 50%; transform: translateX(-50%); color: #ff8888; }
    .e-label { top: 50%; right: 3%; transform: translateY(-50%); color: #88ffaa; }
    .s-label { bottom: 6%; left: 50%; transform: translateX(-50%); color: #ffaa66; }
    .w-label { top: 50%; left: 3%; transform: translateY(-50%); color: #88ffaa; }

    .info-panel {
        background: rgba(10, 20, 35, 0.95);
        backdrop-filter: blur(12px);
        border-radius: 40px;
        padding: 18px 24px;
        text-align: center;
        width: 100%;
        border: 1px solid rgba(255,255,255,0.15);
    }

    .heading {
        font-size: 58px;
        font-weight: 800;
        font-family: monospace;
        background: linear-gradient(135deg, #fff, #88aaff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }

    .direction {
        font-size: 28px;
        font-weight: 700;
        color: #ffaa66;
        margin-top: 5px;
        letter-spacing: 2px;
    }

    .mode-badge {
        font-size: 11px;
        margin-top: 10px;
        padding: 6px 12px;
        background: rgba(0,0,0,0.6);
        border-radius: 30px;
        display: inline-block;
        color: #88aaff;
    }

    .control-buttons {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 10px;
    }

    button {
        background: linear-gradient(135deg, #4a90e2, #2c5aa6);
        border: none;
        padding: 12px 24px;
        border-radius: 50px;
        color: white;
        font-weight: bold;
        font-size: 14px;
        cursor: pointer;
        transition: transform 0.1s;
        flex: 1;
        min-width: 100px;
    }

    button:active {
        transform: scale(0.97);
    }

    .mode-btn {
        background: linear-gradient(135deg, #6c5ce7, #4834d4);
    }

    .test-btn {
        background: rgba(74, 144, 226, 0.5);
        backdrop-filter: blur(4px);
    }

    .help-text {
        font-size: 12px;
        color: #aaddff;
        background: rgba(0,0,0,0.5);
        padding: 12px;
        border-radius: 30px;
        text-align: center;
        line-height: 1.5;
    }

    @media (max-width: 480px) {
        .heading { font-size: 42px; }
        .direction { font-size: 22px; }
        .dir-label { font-size: 16px; padding: 2px 8px; }
        button { padding: 10px 16px; font-size: 12px; }
    }

    /* Gyro indicator */
    .gyro-indicator {
        width: 100%;
        height: 4px;
        background: rgba(255,255,255,0.2);
        border-radius: 2px;
        margin-top: 15px;
        overflow: hidden;
    }

    .gyro-bar {
        height: 100%;
        background: linear-gradient(90deg, #4a90e2, #88aaff);
        width: 0%;
        transition: width 0.3s;
        border-radius: 2px;
    }
</style>
</head>
<body>

<div class="compass-wrapper">
    <div class="compass-card">
        <div class="compass-container" id="compassContainer">
            <div class="compass-outer">
                <div class="compass-face">
                    <div class="compass-dial" id="compassDial">
                        <div id="ticksContainer" style="position:relative; width:100%; height:100%;"></div>
                        <div class="dir-label n-label">N</div>
                        <div class="dir-label e-label">E</div>
                        <div class="dir-label s-label">S</div>
                        <div class="dir-label w-label">W</div>
                    </div>
                    <div class="needle-container">
                        <div class="needle"></div>
                        <div class="needle-center"></div>
                    </div>
                    <div class="north-badge">⚡ NORTH</div>
                </div>
            </div>
        </div>
    </div>

    <div class="info-panel">
        <div class="heading" id="headingValue">0°</div>
        <div class="direction" id="directionValue">NORTH</div>
        <div class="mode-badge" id="modeBadge">🎮 GYRO MODE - Move your device!</div>
        <div class="gyro-indicator">
            <div class="gyro-bar" id="gyroBar"></div>
        </div>
    </div>

    <div class="control-buttons">
        <button id="gyroModeBtn" class="mode-btn">🎮 GYRO MODE</button>
        <button id="dragModeBtn" class="mode-btn">🖱️ DRAG MODE</button>
        <button id="autoRotateBtn">🔄 AUTO ROTATE</button>
    </div>
    <div class="control-buttons">
        <button id="testNorthBtn" class="test-btn">⬆️ N (0°)</button>
        <button id="testEastBtn" class="test-btn">➡️ E (90°)</button>
        <button id="testSouthBtn" class="test-btn">⬇️ S (180°)</button>
        <button id="testWestBtn" class="test-btn">⬅️ W (270°)</button>
    </div>
    <div class="help-text" id="helpText">
        🚀 INSTANT RESPONSE! <br>
        • GYRO MODE: Move/rotate your phone - compass moves instantly<br>
        • DRAG MODE: Drag on compass to rotate manually<br>
        • AUTO ROTATE: Automatic rotation demo<br>
        • Test buttons: Jump to any direction instantly
    </div>
</div>

<script>
    // DOM elements
    const compassDial = document.getElementById('compassDial');
    const headingValue = document.getElementById('headingValue');
    const directionValue = document.getElementById('directionValue');
    const modeBadge = document.getElementById('modeBadge');
    const gyroBar = document.getElementById('gyroBar');
    const compassContainer = document.getElementById('compassContainer');
    const helpText = document.getElementById('helpText');

    let currentHeading = 0;
    let currentMode = 'gyro'; // gyro, drag, auto
    let isDragging = false;
    let dragStartX = 0;
    let dragStartHeading = 0;
    let autoRotateAngle = 0;
    let autoRotateInterval = null;
    let sensorActive = false;

    // Generate degree ticks
    function generateTicks() {
        const container = document.getElementById('ticksContainer');
        container.innerHTML = '';
        
        for (let deg = 0; deg < 360; deg += 10) {
            const isMajor = deg % 30 === 0;
            const isCardinal = deg % 90 === 0;
            
            const tick = document.createElement('div');
            const radius = 46;
            const radian = (deg - 90) * Math.PI / 180;
            const x = 50 + radius * Math.cos(radian);
            const y = 50 + radius * Math.sin(radian);
            
            tick.style.position = 'absolute';
            tick.style.left = `${x}%`;
            tick.style.top = `${y}%`;
            tick.style.transform = `translate(-50%, -50%) rotate(${deg}deg)`;
            tick.style.width = isMajor ? '3px' : '2px';
            tick.style.height = isMajor ? '14px' : '8px';
            tick.style.backgroundColor = isCardinal ? '#ffaa66' : (isMajor ? '#aaa' : '#666');
            tick.style.borderRadius = '2px';
            
            if (isMajor && !isCardinal) {
                const num = document.createElement('span');
                num.textContent = deg;
                num.style.position = 'absolute';
                num.style.left = '50%';
                num.style.top = '18px';
                num.style.transform = 'translateX(-50%)';
                num.style.fontSize = '8px';
                num.style.color = '#aaa';
                tick.appendChild(num);
            }
            
            container.appendChild(tick);
        }
    }

    // Update compass display
    function updateCompass(heading) {
        if (!compassDial) return;
        // Normalize heading
        heading = heading % 360;
        if (heading < 0) heading += 360;
        
        currentHeading = heading;
        compassDial.style.transform = `rotate(${-heading}deg)`;
        
        const rounded = Math.round(heading);
        headingValue.textContent = `${rounded}°`;
        
        const fullNames = ['NORTH', 'NORTH-NORTHEAST', 'NORTHEAST', 'EAST-NORTHEAST', 
                          'EAST', 'EAST-SOUTHEAST', 'SOUTHEAST', 'SOUTH-SOUTHEAST',
                          'SOUTH', 'SOUTH-SOUTHWEST', 'SOUTHWEST', 'WEST-SOUTHWEST',
                          'WEST', 'WEST-NORTHWEST', 'NORTHWEST', 'NORTH-NORTHWEST'];
        
        const idx = Math.round((heading + 11.25) % 360 / 22.5);
        directionValue.textContent = fullNames[idx % 16];
        
        // Update gyro bar for visual feedback
        const intensity = Math.abs(Math.sin(heading * Math.PI / 180));
        gyroBar.style.width = `${intensity * 100}%`;
    }

    // Set heading instantly
    function setHeading(heading, source = 'manual') {
        updateCompass(heading);
        if (source === 'manual' && currentMode === 'gyro') {
            // Still update but keep gyro mode
        }
    }

    // GYRO MODE - Using DeviceOrientation
    let lastGyroHeading = 0;
    let gyroFiltered = null;
    
    function startGyroMode() {
        currentMode = 'gyro';
        modeBadge.innerHTML = '🎮 GYRO MODE - Move/rotate your device!';
        modeBadge.style.background = 'rgba(100,200,100,0.3)';
        helpText.innerHTML = '🎯 GYRO ACTIVE! Rotate your phone - compass responds INSTANTLY!';
        
        // Stop auto rotate
        if (autoRotateInterval) {
            clearInterval(autoRotateInterval);
            autoRotateInterval = null;
        }
        
        // Request permission if needed (iOS)
        if (typeof DeviceOrientationEvent !== 'undefined' && 
            typeof DeviceOrientationEvent.requestPermission === 'function') {
            // iOS needs user gesture - show message
            if (!sensorActive) {
                helpText.innerHTML = '📱 Tap anywhere on compass to enable gyro sensors';
                compassContainer.style.cursor = 'pointer';
                compassContainer.onclick = async () => {
                    try {
                        const permission = await DeviceOrientationEvent.requestPermission();
                        if (permission === 'granted') {
                            window.addEventListener('deviceorientation', handleGyroData);
                            sensorActive = true;
                            helpText.innerHTML = '✅ GYRO ACTIVE! Rotate your phone to see compass move!';
                            compassContainer.onclick = null;
                        }
                    } catch(e) {
                        helpText.innerHTML = '⚠️ Permission needed. Please allow motion sensors.';
                    }
                };
            }
        } else {
            // Android / Others - add listener directly
            if (!sensorActive) {
                window.addEventListener('deviceorientation', handleGyroData);
                sensorActive = true;
                helpText.innerHTML = '✅ GYRO ACTIVE! Rotate your phone to see compass move!';
            }
        }
    }
    
    function handleGyroData(event) {
        let heading = null;
        
        // iOS
        if (event.webkitCompassHeading !== undefined) {
            heading = event.webkitCompassHeading;
        }
        // Android absolute
        else if (event.absolute === true && event.alpha !== null) {
            heading = event.alpha;
        }
        
        if (heading !== null && !isNaN(heading)) {
            heading = heading % 360;
            if (heading < 0) heading += 360;
            
            // Smoothing for less jitter
            if (gyroFiltered === null) {
                gyroFiltered = heading;
            } else {
                let diff = heading - gyroFiltered;
                if (diff > 180) diff -= 360;
                if (diff < -180) diff += 360;
                gyroFiltered += diff * 0.4;
                if (gyroFiltered >= 360) gyroFiltered -= 360;
                if (gyroFiltered < 0) gyroFiltered += 360;
            }
            updateCompass(gyroFiltered);
            lastGyroHeading = heading;
        }
    }

    // DRAG MODE - Drag on compass to rotate
    function startDragMode() {
        currentMode = 'drag';
        modeBadge.innerHTML = '🖱️ DRAG MODE - Drag compass to rotate';
        modeBadge.style.background = 'rgba(74,144,226,0.3)';
        helpText.innerHTML = '👉 Drag your finger/mouse on the compass to rotate it instantly!';
        
        if (autoRotateInterval) {
            clearInterval(autoRotateInterval);
            autoRotateInterval = null;
        }
        
        let startAngle = 0;
        let startHeading = 0;
        
        const getAngleFromEvent = (e) => {
            const rect = compassContainer.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            const dx = clientX - centerX;
            const dy = clientY - centerY;
            let angle = Math.atan2(dy, dx) * 180 / Math.PI;
            angle = (angle + 90 + 360) % 360;
            return angle;
        };
        
        const onDragStart = (e) => {
            e.preventDefault();
            isDragging = true;
            startAngle = getAngleFromEvent(e);
            startHeading = currentHeading;
            compassContainer.style.cursor = 'grabbing';
        };
        
        const onDragMove = (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const currentAngle = getAngleFromEvent(e);
            let delta = currentAngle - startAngle;
            let newHeading = (startHeading - delta + 360) % 360;
            updateCompass(newHeading);
        };
        
        const onDragEnd = () => {
            isDragging = false;
            compassContainer.style.cursor = 'grab';
        };
        
        compassContainer.style.cursor = 'grab';
        compassContainer.addEventListener('mousedown', onDragStart);
        window.addEventListener('mousemove', onDragMove);
        window.addEventListener('mouseup', onDragEnd);
        compassContainer.addEventListener('touchstart', onDragStart);
        window.addEventListener('touchmove', onDragMove);
        window.addEventListener('touchend', onDragEnd);
        
        // Store cleanup
        window.dragCleanup = () => {
            compassContainer.removeEventListener('mousedown', onDragStart);
            window.removeEventListener('mousemove', onDragMove);
            window.removeEventListener('mouseup', onDragEnd);
            compassContainer.removeEventListener('touchstart', onDragStart);
            window.removeEventListener('touchmove', onDragMove);
            window.removeEventListener('touchend', onDragEnd);
        };
    }

    // AUTO ROTATE MODE
    function startAutoRotate() {
        currentMode = 'auto';
        modeBadge.innerHTML = '🔄 AUTO ROTATE - Automatic rotation demo';
        modeBadge.style.background = 'rgba(255,170,68,0.3)';
        helpText.innerHTML = '🔄 Auto-rotating! Watch the compass spin smoothly.';
        
        if (autoRotateInterval) clearInterval(autoRotateInterval);
        
        let angle = 0;
        autoRotateInterval = setInterval(() => {
            angle = (angle + 2) % 360;
            updateCompass(angle);
        }, 20);
    }

    // Test buttons
    function setupTestButtons() {
        document.getElementById('testNorthBtn').onclick = () => {
            if (autoRotateInterval) clearInterval(autoRotateInterval);
            setHeading(0, 'manual');
        };
        document.getElementById('testEastBtn').onclick = () => {
            if (autoRotateInterval) clearInterval(autoRotateInterval);
            setHeading(90, 'manual');
        };
        document.getElementById('testSouthBtn').onclick = () => {
            if (autoRotateInterval) clearInterval(autoRotateInterval);
            setHeading(180, 'manual');
        };
        document.getElementById('testWestBtn').onclick = () => {
            if (autoRotateInterval) clearInterval(autoRotateInterval);
            setHeading(270, 'manual');
        };
    }

    // Mode switchers
    function setupModeButtons() {
        document.getElementById('gyroModeBtn').onclick = () => {
            if (window.dragCleanup) window.dragCleanup();
            startGyroMode();
        };
        document.getElementById('dragModeBtn').onclick = () => {
            if (window.dragCleanup) window.dragCleanup();
            startDragMode();
        };
        document.getElementById('autoRotateBtn').onclick = () => {
            if (window.dragCleanup) window.dragCleanup();
            startAutoRotate();
        };
    }

    // Fallback for devices without gyro - start with drag mode
    function init() {
        generateTicks();
        setupTestButtons();
        setupModeButtons();
        updateCompass(0);
        
        // Check if device has gyro
        if (!window.DeviceOrientationEvent) {
            helpText.innerHTML = '⚠️ No gyro detected. Using DRAG MODE - drag the compass!';
            startDragMode();
        } else {
            // Start with gyro mode but show instructions
            startGyroMode();
        }
    }

    // Animation for smooth rendering
    function animate() {
        requestAnimationFrame(animate);
    }
    animate();
    
    init();
    
    console.log('🚀 Ultra-fast compass ready! Use GYRO MODE for instant response!');
</script>
</body>
   </html>
                                                                     </html>
