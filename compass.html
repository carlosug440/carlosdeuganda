<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Digital Compass</title>
<style>
body, html {
  margin:0;
  padding:0;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(to bottom, #1a1a1a, #333);
  font-family: Arial, sans-serif;
  color:white;
}
.compass-container {
  position: relative;
  width: 350px;
  height: 350px;
}
.compass {
  width: 100%;
  height: 100%;
  border: 6px solid white;
  border-radius: 50%;
  position: relative;
  box-shadow: 0 0 30px rgba(255,255,255,0.5);
}
.needle {
  width: 6px;
  height: 160px;
  background: red;
  position: absolute;
  top: 10px;
  left: 50%;
  transform-origin: bottom center;
  transform: rotate(0deg);
  transition: transform 0.3s ease-out;
  border-radius: 3px;
}
.direction {
  position: absolute;
  font-weight: bold;
  font-size: 20px;
  text-shadow: 0 0 5px black;
}
.north {top:10px; left:50%; transform: translateX(-50%);}
.east {top:50%; right:10px; transform: translateY(-50%);}
.south {bottom:10px; left:50%; transform: translateX(-50%);}
.west {top:50%; left:10px; transform: translateY(-50%);}
.degree {
  margin-top: 20px;
  text-align: center;
  font-size: 26px;
}
</style>
</head>
<body>

<div>
  <div class="compass-container">
    <div class="compass">
      <div class="needle" id="needle"></div>
      <div class="direction north">N</div>
      <div class="direction east">E</div>
      <div class="direction south">S</div>
      <div class="direction west">W</div>
    </div>
  </div>
  <div class="degree" id="degree">0°</div>
</div>

<script>
const needle = document.getElementById("needle");
const degreeDisplay = document.getElementById("degree");

let currentAngle = 0;

// Smooth rotation function
function rotateTo(angle){
  // Shortest path rotation
  let delta = angle - currentAngle;
  if(delta > 180) delta -= 360;
  if(delta < -180) delta += 360;
  currentAngle += delta;
  needle.style.transform = `rotate(${currentAngle}deg)`;
  degreeDisplay.innerText = `${Math.round(currentAngle)}°`;
}

// Device orientation for mobile
if(window.DeviceOrientationEvent){
  window.addEventListener('deviceorientation', function(event){
    let alpha = event.alpha; // 0-360
    if(alpha !== null) rotateTo(alpha);
  }, true);
}
// Desktop fallback: use mouse movement to simulate rotation
else{
  window.addEventListener('mousemove', e=>{
    let angle = (e.clientX / window.innerWidth) * 360;
    rotateTo(angle);
  });
}
</script>

</body>
  </html>
