<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Live Magnetic Compass | Find North</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        min-height: 100vh;
        background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
        padding: 20px;
    }

    .compass-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        width: 100%;
        max-width: 450px;
    }

    /* Compass Card */
    .compass-card {
        background: rgba(20, 28, 40, 0.9);
        backdrop-filter: blur(20px);
        border-radius: 50px;
        padding: 20px;
        box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.2);
        width: 100%;
    }

    .compass-container {
        position: relative;
        width: 100%;
        aspect-ratio: 1 / 1;
        max-width: 350px;
        margin: 0 auto;
    }

    .compass-outer {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: linear-gradient(135deg, #2a3348, #1a1f2e);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5), inset 0 2px 5px rgba(255,255,255,0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
    }

    .compass-face {
        width: 94%;
        height: 94%;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #1e2a3a, #0a0f18);
        position: relative;
        overflow: visible;
    }

    /* Rotating Dial */
    .compass-dial {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        transition: transform 0.05s linear;
        will-change: transform;
    }

    /* Degree Markers */
    .tick-mark {
        position: absolute;
        left: 50%;
        top: 0;
        transform-origin: bottom center;
    }

    /* Fixed Needle */
    .needle-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        z-index: 20;
    }

    .needle {
        position: relative;
        width: 8px;
        height: 42%;
        background: linear-gradient(180deg, #ff4444, #aa2222);
        border-radius: 4px;
        transform-origin: bottom center;
        margin-top: -42%;
        box-shadow: 0 0 10px rgba(255, 68, 68, 0.6);
        z-index: 21;
    }

    .needle::before {
        content: "▼";
        position: absolute;
        top: -20px;
        left: 50%;
        transform: translateX(-50%);
        color: #ff4444;
        font-size: 18px;
    }

    .needle-center {
        position: absolute;
        width: 28px;
        height: 28px;
        background: radial-gradient(circle, #ffdd99, #ccaa66);
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        box-shadow: 0 0 8px rgba(0,0,0,0.5);
        z-index: 22;
        border: 2px solid #ffaa44;
    }

    .north-badge {
        position: absolute;
        top: -15px;
        left: 50%;
        transform: translateX(-50%);
        background: #ff4444;
        color: white;
        padding: 4px 14px;
        border-radius: 30px;
        font-size: 12px;
        font-weight: bold;
        z-index: 25;
        white-space: nowrap;
        box-shadow: 0 2px 8px rgba(255,68,68,0.4);
    }

    /* Direction Labels */
    .dir-label {
        position: absolute;
        font-weight: bold;
        font-size: 20px;
        text-shadow: 0 2px 4px black;
        background: rgba(0,0,0,0.4);
        padding: 4px 10px;
        border-radius: 30px;
        backdrop-filter: blur(4px);
    }
    .n-label { top: 8%; left: 50%; transform: translateX(-50%); color: #ff8888; }
    .e-label { top: 50%; right: 5%; transform: translateY(-50%); color: #88ffaa; }
    .s-label { bottom: 8%; left: 50%; transform: translateX(-50%); color: #ffaa66; }
    .w-label { top: 50%; left: 5%; transform: translateY(-50%); color: #88ffaa; }

    /* Info Panel */
    .info-panel {
        background: rgba(10, 20, 35, 0.9);
        backdrop-filter: blur(12px);
        border-radius: 40px;
        padding: 18px 24px;
        text-align: center;
        width: 100%;
        border: 1px solid rgba(255,255,255,0.15);
    }

    .heading {
        font-size: 52px;
        font-weight: 800;
        font-family: monospace;
        background: linear-gradient(135deg, #fff, #88aaff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }

    .direction {
        font-size: 26px;
        font-weight: 700;
        color: #ffaa66;
        margin-top: 5px;
        letter-spacing: 2px;
    }

    .status {
        font-size: 12px;
        margin-top: 12px;
        padding: 6px 12px;
        background: rgba(0,0,0,0.5);
        border-radius: 30px;
        display: inline-block;
        color: #aaddff;
    }

    button {
        background: linear-gradient(135deg, #4a90e2, #2c5aa6);
        border: none;
        padding: 14px 28px;
        border-radius: 50px;
        color: white;
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
        width: 100%;
        max-width: 280px;
        transition: transform 0.1s;
    }

    button:active {
        transform: scale(0.98);
    }

    .help-text {
        font-size: 12px;
        color: #ffaa66;
        background: rgba(0,0,0,0.5);
        padding: 12px;
        border-radius: 30px;
        text-align: center;
        line-height: 1.5;
    }

    @media (max-width: 480px) {
        .heading { font-size: 38px; }
        .direction { font-size: 20px; }
        .dir-label { font-size: 16px; padding: 2px 8px; }
    }
</style>
</head>
<body>

<div class="compass-wrapper">
    <div class="compass-card">
        <div class="compass-container">
            <div class="compass-outer">
                <div class="compass-face">
                    <div class="compass-dial" id="compassDial">
                        <div id="ticksContainer" style="position:relative; width:100%; height:100%;"></div>
                        <div class="dir-label n-label">N</div>
                        <div class="dir-label e-label">E</div>
                        <div class="dir-label s-label">S</div>
                        <div class="dir-label w-label">W</div>
                    </div>
                    <div class="needle-container">
                        <div class="needle"></div>
                        <div class="needle-center"></div>
                    </div>
                    <div class="north-badge">⚡ NORTH</div>
                </div>
            </div>
        </div>
    </div>

    <div class="info-panel">
        <div class="heading" id="headingValue">0°</div>
        <div class="direction" id="directionValue">NORTH</div>
        <div class="status" id="statusText">🎯 Point your device to see North</div>
    </div>

    <button id="enableBtn" style="display: none;">🔓 Enable Compass</button>
    <div class="help-text" id="helpText"></div>
</div>

<script>
    // Get DOM elements
    const compassDial = document.getElementById('compassDial');
    const headingValue = document.getElementById('headingValue');
    const directionValue = document.getElementById('directionValue');
    const statusText = document.getElementById('statusText');
    const enableBtn = document.getElementById('enableBtn');
    const helpText = document.getElementById('helpText');
    const ticksContainer = document.getElementById('ticksContainer');

    let currentHeading = 0;
    let isCompassActive = false;
    let animationId = null;
    let lastHeading = 0;

    // Generate all degree ticks (every 10 degrees)
    function generateTicks() {
        ticksContainer.innerHTML = '';
        
        for (let deg = 0; deg < 360; deg += 10) {
            const isMajor = deg % 30 === 0;
            const isCardinal = deg % 90 === 0;
            
            const tick = document.createElement('div');
            tick.style.position = 'absolute';
            tick.style.left = '50%';
            tick.style.top = '0';
            
            // Calculate position on circle
            const radius = 46; // percentage
            const radian = (deg - 90) * Math.PI / 180;
            const x = 50 + radius * Math.cos(radian);
            const y = 50 + radius * Math.sin(radian);
            
            tick.style.left = `${x}%`;
            tick.style.top = `${y}%`;
            tick.style.transform = `translate(-50%, -50%) rotate(${deg}deg)`;
            tick.style.width = isMajor ? '3px' : '2px';
            tick.style.height = isMajor ? '14px' : '8px';
            tick.style.backgroundColor = isCardinal ? '#ffaa66' : (isMajor ? '#aaa' : '#666');
            tick.style.borderRadius = '2px';
            tick.style.position = 'absolute';
            
            // Add number for major degrees (except cardinals)
            if (isMajor && !isCardinal) {
                const num = document.createElement('span');
                num.textContent = deg;
                num.style.position = 'absolute';
                num.style.left = '50%';
                num.style.top = '18px';
                num.style.transform = 'translateX(-50%)';
                num.style.fontSize = '8px';
                num.style.color = '#aaa';
                num.style.whiteSpace = 'nowrap';
                tick.appendChild(num);
            }
            
            ticksContainer.appendChild(tick);
        }
    }

    // Update compass display (dial rotates opposite to heading so North aligns with needle)
    function updateCompass(heading) {
        if (!compassDial) return;
        // Dial rotates opposite direction so that North (0°) points to the fixed needle
        compassDial.style.transform = `rotate(${-heading}deg)`;
        
        // Update heading text
        const rounded = Math.round(heading);
        headingValue.textContent = `${rounded}°`;
        
        // Get cardinal direction
        const directions = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE', 
                           'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'];
        const fullNames = ['NORTH', 'NORTH-NORTHEAST', 'NORTHEAST', 'EAST-NORTHEAST', 
                          'EAST', 'EAST-SOUTHEAST', 'SOUTHEAST', 'SOUTH-SOUTHEAST',
                          'SOUTH', 'SOUTH-SOUTHWEST', 'SOUTHWEST', 'WEST-SOUTHWEST',
                          'WEST', 'WEST-NORTHWEST', 'NORTHWEST', 'NORTH-NORTHWEST'];
        
        const idx = Math.round((heading + 11.25) % 360 / 22.5);
        directionValue.textContent = fullNames[idx % 16];
    }

    // Smooth heading filter to reduce jitter
    let filteredHeading = null;
    function smoothHeading(newHeading) {
        if (filteredHeading === null) {
            filteredHeading = newHeading;
        } else {
            let diff = newHeading - filteredHeading;
            if (diff > 180) diff -= 360;
            if (diff < -180) diff += 360;
            filteredHeading += diff * 0.3; // Smoothing factor
            if (filteredHeading >= 360) filteredHeading -= 360;
            if (filteredHeading < 0) filteredHeading += 360;
        }
        updateCompass(filteredHeading);
        return filteredHeading;
    }

    // Main orientation event handler
    function handleOrientation(event) {
        let heading = null;
        
        // iOS: webkitCompassHeading gives magnetic north directly
        if (event.webkitCompassHeading !== undefined) {
            heading = event.webkitCompassHeading;
            if (!isCompassActive) {
                isCompassActive = true;
                statusText.innerHTML = '✅ Compass active - North detected!';
                statusText.style.background = 'rgba(100,200,100,0.3)';
                helpText.innerHTML = '';
                enableBtn.style.display = 'none';
            }
        }
        // Android: absolute orientation with alpha
        else if (event.absolute === true && event.alpha !== null) {
            heading = event.alpha;
            if (!isCompassActive) {
                isCompassActive = true;
                statusText.innerHTML = '✅ Compass active - Rotate to see North';
                statusText.style.background = 'rgba(100,200,100,0.3)';
                helpText.innerHTML = '';
                enableBtn.style.display = 'none';
            }
        }
        
        if (heading !== null && !isNaN(heading)) {
            // Normalize to 0-360
            heading = heading % 360;
            if (heading < 0) heading += 360;
            smoothHeading(heading);
        }
    }

    // For devices that need explicit permission (iOS)
    function requestPermission() {
        if (typeof DeviceOrientationEvent !== 'undefined' && 
            typeof DeviceOrientationEvent.requestPermission === 'function') {
            
            enableBtn.style.display = 'block';
            helpText.innerHTML = '🔐 iOS requires permission to access compass. Tap "Enable Compass" to start.';
            statusText.innerHTML = '📱 Tap button below to enable compass';
            
            enableBtn.onclick = async () => {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                        window.addEventListener('deviceorientationabsolute', handleOrientation);
                        enableBtn.style.display = 'none';
                        statusText.innerHTML = '✅ Compass enabled! Point your device North';
                        helpText.innerHTML = '🔄 Move your device in a figure-8 pattern for best accuracy';
                        setTimeout(() => {
                            if (helpText.innerHTML.includes('figure-8')) {
                                helpText.innerHTML = '';
                            }
                        }, 5000);
                    } else {
                        helpText.innerHTML = '⚠️ Permission denied. To enable: Settings → Safari → Motion & Orientation → Allow';
                        statusText.innerHTML = '❌ Compass access required';
                    }
                } catch (err) {
                    helpText.innerHTML = '⚠️ Error requesting permission. Please check device settings.';
                    console.error(err);
                }
            };
        } else {
            // Android / Other - add listener directly
            window.addEventListener('deviceorientationabsolute', handleOrientation);
            window.addEventListener('deviceorientation', handleOrientation);
            statusText.innerHTML = '🧭 Compass ready - Point device to find North';
            helpText.innerHTML = '🔄 For best accuracy, rotate your device in a figure-8 pattern';
            setTimeout(() => {
                if (helpText.innerHTML.includes('figure-8')) {
                    helpText.innerHTML = '';
                }
            }, 6000);
        }
    }

    // Fallback demo for desktop - SIMULATES COMPASS MOVEMENT
    let demoMode = false;
    function startDemoMode() {
        if (demoMode) return;
        demoMode = true;
        statusText.innerHTML = '💻 Desktop Demo - Move your mouse to rotate compass';
        helpText.innerHTML = '🎮 This is a simulation. For real compass, open on a mobile device.';
        
        let demoAngle = 0;
        
        const updateDemo = (xPos) => {
            demoAngle = (xPos / window.innerWidth) * 360;
            smoothHeading(demoAngle);
            if (!isCompassActive) {
                headingValue.textContent = `${Math.round(demoAngle)}°`;
                const dirs = ['NORTH', 'NORTHEAST', 'EAST', 'SOUTHEAST', 'SOUTH', 'SOUTHWEST', 'WEST', 'NORTHWEST'];
                const idx2 = Math.round(demoAngle / 45) % 8;
                directionValue.textContent = dirs[idx2];
            }
        };
        
        window.addEventListener('mousemove', (e) => updateDemo(e.clientX));
        window.addEventListener('touchmove', (e) => {
            if (e.touches[0]) updateDemo(e.touches[0].clientX);
        });
        
        // Initial position
        updateDemo(window.innerWidth / 2);
    }

    // Check if device has orientation support
    function init() {
        generateTicks();
        
        // Check if it's a mobile device
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        if ('DeviceOrientationEvent' in window) {
            if (isMobile) {
                requestPermission();
                // Also set a timeout to check if compass actually started
                setTimeout(() => {
                    if (!isCompassActive && !demoMode) {
                        statusText.innerHTML = '🔄 Still waiting for compass data...';
                        helpText.innerHTML = 'Try moving your device in a figure-8 pattern to activate sensors';
                    }
                }, 3000);
            } else {
                startDemoMode();
            }
        } else {
            statusText.innerHTML = '⚠️ Device orientation not supported';
            startDemoMode();
        }
        
        // Initial display
        updateCompass(0);
    }

    // Animation loop for smooth rendering
    function animate() {
        animationId = requestAnimationFrame(animate);
    }
    animate();
    
    // Start everything
    init();
    
    // Cleanup
    window.addEventListener('beforeunload', () => {
        if (animationId) cancelAnimationFrame(animationId);
    });
    
    // Log for debugging
    console.log('Compass initialized - Looking for North...');
</script>
</body>
   </html>
