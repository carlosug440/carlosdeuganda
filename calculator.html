<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Advanced Scientific Calculator | Graph Plotter</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', 'Poppins', Arial, sans-serif;
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        padding: 20px;
    }

    .main-container {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center;
        align-items: flex-start;
        max-width: 1200px;
        width: 100%;
    }

    .calculator {
        background: rgba(2, 6, 23, 0.95);
        backdrop-filter: blur(10px);
        padding: 20px;
        border-radius: 20px;
        width: 100%;
        max-width: 480px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        border: 1px solid rgba(56, 189, 248, 0.2);
    }

    .graph-container {
        background: rgba(2, 6, 23, 0.95);
        backdrop-filter: blur(10px);
        padding: 20px;
        border-radius: 20px;
        width: 100%;
        max-width: 550px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        border: 1px solid rgba(56, 189, 248, 0.2);
    }

    .graph-header {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
        flex-wrap: wrap;
    }

    .graph-input {
        flex: 1;
        padding: 10px 15px;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 10px;
        color: white;
        font-size: 14px;
        outline: none;
    }

    .graph-input:focus {
        border-color: #38bdf8;
    }

    .graph-btn {
        padding: 10px 20px;
        background: #38bdf8;
        border: none;
        border-radius: 10px;
        color: #0f172a;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .graph-btn:hover {
        background: #0ea5e9;
        transform: translateY(-2px);
    }

    canvas {
        background: #1e293b;
        border-radius: 12px;
        width: 100%;
        height: auto;
        cursor: crosshair;
    }

    .graph-controls {
        display: flex;
        gap: 10px;
        margin-top: 15px;
        justify-content: center;
        flex-wrap: wrap;
    }

    .control-btn {
        padding: 6px 12px;
        background: #334155;
        border: none;
        border-radius: 8px;
        color: white;
        cursor: pointer;
        font-size: 12px;
        transition: 0.3s;
    }

    .control-btn:hover {
        background: #38bdf8;
    }

    .coord-display {
        margin-top: 10px;
        text-align: center;
        font-size: 12px;
        color: #94a3b8;
    }

    #display {
        width: 100%;
        height: 70px;
        font-size: 24px;
        margin-bottom: 15px;
        padding: 15px;
        border: none;
        outline: none;
        background: #1e293b;
        color: white;
        border-radius: 12px;
        text-align: right;
        font-family: monospace;
        letter-spacing: 1px;
    }

    .mode-buttons {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
    }

    .mode-btn {
        flex: 1;
        padding: 8px;
        background: #334155;
        border: none;
        border-radius: 8px;
        color: white;
        cursor: pointer;
        font-size: 12px;
        transition: 0.3s;
    }

    .mode-btn.active {
        background: #38bdf8;
        color: #0f172a;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
    }

    button {
        padding: 12px;
        font-size: 14px;
        border: none;
        cursor: pointer;
        background: #1e293b;
        color: white;
        border-radius: 10px;
        transition: all 0.2s;
        font-weight: 500;
    }

    button:hover {
        background: #38bdf8;
        transform: translateY(-2px);
    }

    .equal {
        background: #38bdf8;
        color: #0f172a;
        font-weight: bold;
    }

    .equal:hover {
        background: #0ea5e9;
    }

    .calc-btn {
        background: #334155;
    }

    .func-btn {
        background: #4c1d95;
    }

    .trig-btn {
        background: #065f46;
    }

    .clear-btn {
        background: #dc2626;
    }

    .clear-btn:hover {
        background: #b91c1c;
    }

    .result-panel {
        margin-top: 15px;
        padding: 10px;
        background: #1e293b;
        border-radius: 10px;
        font-size: 12px;
        color: #94a3b8;
        text-align: center;
    }

    @media (max-width: 768px) {
        .main-container {
            flex-direction: column;
            align-items: center;
        }
        .calculator, .graph-container {
            max-width: 100%;
        }
        button { padding: 10px; font-size: 12px; }
    }
</style>
</head>
<body>

<div class="main-container">
    <div class="calculator">
        <input type="text" id="display" readonly>
        
        <div class="mode-buttons">
            <button class="mode-btn active" data-mode="deg">DEG</button>
            <button class="mode-btn" data-mode="rad">RAD</button>
        </div>
        
        <div class="buttons">
            <!-- Row 1 -->
            <button onclick="clearAll()" class="clear-btn">AC</button>
            <button onclick="clearDisplay()" class="calc-btn">C</button>
            <button onclick="deleteLast()" class="calc-btn">DEL</button>
            <button onclick="insert('(')" class="calc-btn">(</button>
            <button onclick="insert(')')" class="calc-btn">)</button>
            
            <!-- Row 2 -->
            <button onclick="insert('7')">7</button>
            <button onclick="insert('8')">8</button>
            <button onclick="insert('9')">9</button>
            <button onclick="insert('/')" class="calc-btn">÷</button>
            <button onclick="sqrt()" class="func-btn">√</button>
            
            <!-- Row 3 -->
            <button onclick="insert('4')">4</button>
            <button onclick="insert('5')">5</button>
            <button onclick="insert('6')">6</button>
            <button onclick="insert('*')" class="calc-btn">×</button>
            <button onclick="power()" class="func-btn">x²</button>
            
            <!-- Row 4 -->
            <button onclick="insert('1')">1</button>
            <button onclick="insert('2')">2</button>
            <button onclick="insert('3')">3</button>
            <button onclick="insert('-')">−</button>
            <button onclick="insert('+')">+</button>
            
            <!-- Row 5 -->
            <button onclick="pi()" class="func-btn">π</button>
            <button onclick="sin()" class="trig-btn">sin</button>
            <button onclick="cos()" class="trig-btn">cos</button>
            <button onclick="tan()" class="trig-btn">tan</button>
            <button onclick="log()" class="func-btn">log</button>
            
            <!-- Row 6 -->
            <button onclick="ln()" class="func-btn">ln</button>
            <button onclick="exp()" class="func-btn">eˣ</button>
            <button onclick="powerN()" class="func-btn">xʸ</button>
            <button onclick="factorial()" class="func-btn">n!</button>
            <button onclick="inverse()" class="func-btn">1/x</button>
            
            <!-- Row 7 -->
            <button onclick="abs()" class="func-btn">|x|</button>
            <button onclick="differentiate()" style="background:#b91c1c;">d/dx</button>
            <button onclick="integrate()" style="background:#b91c1c;">∫dx</button>
            <button onclick="insert('0')">0</button>
            <button onclick="insert('.')">.</button>
            
            <!-- Row 8 -->
            <button class="equal" onclick="calculate()">=</button>
            <button onclick="plotGraph()" style="background:#10b981;">📈 Plot</button>
            <button onclick="sendToGraph()" style="background:#f59e0b;">→ Graph</button>
            <button colspan="2"></button>
        </div>
        
        <div class="result-panel" id="resultPanel">
            💡 Tip: Use d/dx to differentiate | ∫dx to integrate | Click 📈 Plot to graph
        </div>
    </div>

    <div class="graph-container">
        <div class="graph-header">
            <input type="text" id="graphExpr" class="graph-input" placeholder="f(x) = x^2, sin(x), e^x, etc." value="x^2">
            <button class="graph-btn" onclick="plotGraph()">📈 Plot Graph</button>
        </div>
        <canvas id="graphCanvas" width="500" height="400" style="width:100%; height:auto; max-width:500px; aspect-ratio:5/4"></canvas>
        <div class="graph-controls">
            <button class="control-btn" onclick="zoomIn()">🔍 Zoom In</button>
            <button class="control-btn" onclick="zoomOut()">🔍 Zoom Out</button>
            <button class="control-btn" onclick="resetView()">⟳ Reset</button>
            <button class="control-btn" onclick="toggleGrid()">⊞ Toggle Grid</button>
        </div>
        <div class="coord-display" id="coordDisplay">Hover over graph to see coordinates</div>
    </div>
</div>

<script>
    // ========== CALCULATOR FUNCTIONS ==========
    let display = document.getElementById("display");
    let currentMode = "deg";
    let lastResult = null;
    
    // Mode buttons
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMode = btn.dataset.mode;
            showMessage(`Mode switched to ${currentMode.toUpperCase()}`);
        });
    });
    
    function showMessage(msg) {
        const panel = document.getElementById('resultPanel');
        panel.innerHTML = `💡 ${msg}`;
        setTimeout(() => {
            if (panel.innerHTML === `💡 ${msg}`) {
                panel.innerHTML = `💡 Tip: Use d/dx to differentiate | ∫dx to integrate | Click 📈 Plot to graph`;
            }
        }, 3000);
    }
    
    function insert(value) {
        display.value += value;
    }
    
    function clearDisplay() {
        display.value = "";
    }
    
    function clearAll() {
        display.value = "";
        showMessage("Cleared all");
    }
    
    function deleteLast() {
        display.value = display.value.slice(0, -1);
    }
    
    function toRadians(degrees) {
        return degrees * Math.PI / 180;
    }
    
    // Evaluate expression safely
    function evaluateExpression(expr, xVal = null) {
        let processed = expr;
        
        // Replace ^ with **
        processed = processed.replace(/\^/g, '**');
        // Handle π
        processed = processed.replace(/π/g, Math.PI);
        // Handle e
        processed = processed.replace(/e(?![a-z])/g, Math.E);
        
        // Replace x with value if provided
        if (xVal !== null) {
            processed = processed.replace(/x/g, `(${xVal})`);
        }
        
        try {
            const result = new Function('return (' + processed + ')')();
            if (isNaN(result) || !isFinite(result)) throw new Error();
            return result;
        } catch(e) {
            throw new Error('Invalid expression');
        }
    }
    
    function calculate() {
        try {
            let result = evaluateExpression(display.value);
            lastResult = result;
            display.value = result;
            showMessage(`Result: ${result.toFixed(6)}`);
        } catch(e) {
            display.value = "Error";
            showMessage("Invalid expression");
        }
    }
    
    // Basic Math Functions
    function sqrt() {
        try {
            let val = evaluateExpression(display.value);
            display.value = Math.sqrt(val);
        } catch(e) { display.value = "Error"; }
    }
    
    function power() {
        try {
            let val = evaluateExpression(display.value);
            display.value = Math.pow(val, 2);
        } catch(e) { display.value = "Error"; }
    }
    
    function powerN() { display.value += "^"; }
    
    function factorial() {
        try {
            let n = evaluateExpression(display.value);
            if (n < 0 || !Number.isInteger(n)) {
                display.value = "Error (non-negative integer)";
                return;
            }
            let result = 1;
            for (let i = 2; i <= n; i++) result *= i;
            display.value = result;
        } catch(e) { display.value = "Error"; }
    }
    
    function inverse() {
        try {
            let val = evaluateExpression(display.value);
            display.value = 1 / val;
        } catch(e) { display.value = "Error"; }
    }
    
    function abs() {
        try {
            let val = evaluateExpression(display.value);
            display.value = Math.abs(val);
        } catch(e) { display.value = "Error"; }
    }
    
    function exp() {
        try {
            let val = evaluateExpression(display.value);
            display.value = Math.exp(val);
        } catch(e) { display.value = "Error"; }
    }
    
    function sin() {
        try {
            let val = evaluateExpression(display.value);
            if (currentMode === "deg") val = toRadians(val);
            display.value = Math.sin(val);
        } catch(e) { display.value = "Error"; }
    }
    
    function cos() {
        try {
            let val = evaluateExpression(display.value);
            if (currentMode === "deg") val = toRadians(val);
            display.value = Math.cos(val);
        } catch(e) { display.value = "Error"; }
    }
    
    function tan() {
        try {
            let val = evaluateExpression(display.value);
            if (currentMode === "deg") val = toRadians(val);
            display.value = Math.tan(val);
        } catch(e) { display.value = "Error"; }
    }
    
    function log() {
        try {
            let val = evaluateExpression(display.value);
            display.value = Math.log10(val);
        } catch(e) { display.value = "Error"; }
    }
    
    function ln() {
        try {
            let val = evaluateExpression(display.value);
            display.value = Math.log(val);
        } catch(e) { display.value = "Error"; }
    }
    
    function pi() { display.value += Math.PI; }
    
    function differentiate() {
        try {
            let expr = display.value;
            if (!expr) {
                showMessage("Enter an expression like: x^2+2*x+1");
                return;
            }
            
            const h = 1e-6;
            const fn = new Function('x', 'return ' + expr.replace(/\^/g, '**').replace(/π/g, Math.PI));
            
            try { fn(1); } catch(e) {
                showMessage("Expression must contain 'x' variable");
                return;
            }
            
            let x = 0;
            let derivative = (fn(x + h) - fn(x - h)) / (2 * h);
            display.value = derivative;
            showMessage(`d/dx(${expr}) at x=0 = ${derivative.toFixed(6)}`);
        } catch(e) {
            display.value = "Error";
            showMessage("Use 'x' as variable");
        }
    }
    
    function integrate() {
        try {
            let expr = display.value;
            if (!expr) {
                showMessage("Enter an expression like: x^2, sin(x)");
                return;
            }
            
            let jsExpr = expr.replace(/\^/g, '**').replace(/π/g, Math.PI);
            const fn = new Function('x', 'return ' + jsExpr);
            
            try { fn(1); } catch(e) {
                showMessage("Expression must contain 'x' variable");
                return;
            }
            
            let a = 0, b = 1;
            const fromMatch = expr.match(/from\s+(-?\d+\.?\d*)/i);
            const toMatch = expr.match(/to\s+(-?\d+\.?\d*)/i);
            
            if (fromMatch) a = parseFloat(fromMatch[1]);
            if (toMatch) b = parseFloat(toMatch[1]);
            
            if (!fromMatch && !toMatch) {
                const bounds = prompt("Enter integration bounds (from a to b):\nExample: 0 to 1", "0 to 1");
                if (bounds) {
                    const parts = bounds.split('to');
                    if (parts.length === 2) {
                        a = parseFloat(parts[0]);
                        b = parseFloat(parts[1]);
                    }
                }
            }
            
            const n = 1000;
            const h = (b - a) / n;
            let sum = fn(a) + fn(b);
            
            for (let i = 1; i < n; i++) {
                const x = a + i * h;
                sum += i % 2 === 0 ? 2 * fn(x) : 4 * fn(x);
            }
            
            const integral = (h / 3) * sum;
            display.value = integral;
            showMessage(`∫${expr} dx from ${a} to ${b} = ${integral.toFixed(8)}`);
        } catch(e) {
            display.value = "Error";
            showMessage("Use 'x' as variable");
        }
    }
    
    function sendToGraph() {
        document.getElementById('graphExpr').value = display.value;
        plotGraph();
        showMessage(`Sent "${display.value}" to graph`);
    }
    
    // ========== GRAPH PLOTTING ==========
    const canvas = document.getElementById('graphCanvas');
    const ctx = canvas.getContext('2d');
    let width = 500, height = 400;
    let xMin = -5, xMax = 5, yMin = -5, yMax = 5;
    let showGrid = true;
    
    function resizeCanvas() {
        const container = canvas.parentElement;
        width = Math.min(500, container.clientWidth - 40);
        height = width * 0.8;
        canvas.width = width;
        canvas.height = height;
        plotGraph();
    }
    
    function parseFunction(expr) {
        let processed = expr.replace(/\^/g, '**');
        processed = processed.replace(/π/g, Math.PI);
        processed = processed.replace(/e(?![a-z])/g, Math.E);
        return new Function('x', 'return ' + processed);
    }
    
    function plotGraph() {
        const expr = document.getElementById('graphExpr').value;
        if (!expr) {
            showMessage("Please enter an expression like: x^2, sin(x), e^x");
            return;
        }
        
        try {
            const fn = parseFunction(expr);
            fn(0); // Test the function
            
            ctx.clearRect(0, 0, width, height);
            drawGrid();
            drawAxes();
            
            // Plot the function
            ctx.beginPath();
            ctx.strokeStyle = '#38bdf8';
            ctx.lineWidth = 2.5;
            
            let firstPoint = true;
            const steps = width;
            
            for (let i = 0; i <= steps; i++) {
                const x = xMin + (i / steps) * (xMax - xMin);
                let y;
                try {
                    y = fn(x);
                } catch(e) {
                    firstPoint = true;
                    continue;
                }
                
                if (!isFinite(y) || isNaN(y)) {
                    firstPoint = true;
                    continue;
                }
                
                const screenX = ((x - xMin) / (xMax - xMin)) * width;
                const screenY = height - ((y - yMin) / (yMax - yMin)) * height;
                
                if (screenY >= -50 && screenY <= height + 50) {
                    if (firstPoint) {
                        ctx.moveTo(screenX, screenY);
                        firstPoint = false;
                    } else {
                        ctx.lineTo(screenX, screenY);
                    }
                } else {
                    firstPoint = true;
                }
            }
            ctx.stroke();
            
            showMessage(`Graph plotted: f(x) = ${expr}`);
        } catch(e) {
            showMessage(`Error: ${e.message}. Use valid expression like x^2, sin(x), e^x`);
        }
    }
    
    function drawGrid() {
        if (!showGrid) return;
        
        ctx.save();
        ctx.strokeStyle = '#334155';
        ctx.lineWidth = 0.5;
        
        // Vertical grid lines
        const xStep = getNiceStep(xMax - xMin);
        let xGrid = Math.ceil(xMin / xStep) * xStep;
        while (xGrid <= xMax) {
            const screenX = ((xGrid - xMin) / (xMax - xMin)) * width;
            ctx.beginPath();
            ctx.moveTo(screenX, 0);
            ctx.lineTo(screenX, height);
            ctx.stroke();
            xGrid += xStep;
        }
        
        // Horizontal grid lines
        const yStep = getNiceStep(yMax - yMin);
        let yGrid = Math.ceil(yMin / yStep) * yStep;
        while (yGrid <= yMax) {
            const screenY = height - ((yGrid - yMin) / (yMax - yMin)) * height;
            ctx.beginPath();
            ctx.moveTo(0, screenY);
            ctx.lineTo(width, screenY);
            ctx.stroke();
            yGrid += yStep;
        }
        
        ctx.restore();
    }
    
    function drawAxes() {
        ctx.save();
        ctx.strokeStyle = '#94a3b8';
        ctx.lineWidth = 1.5;
        
        // X-axis
        const yZero = height - ((0 - yMin) / (yMax - yMin)) * height;
        if (yZero >= 0 && yZero <= height) {
            ctx.beginPath();
            ctx.moveTo(0, yZero);
            ctx.lineTo(width, yZero);
            ctx.stroke();
            
            // Arrow
            ctx.beginPath();
            ctx.moveTo(width - 10, yZero - 4);
            ctx.lineTo(width, yZero);
            ctx.lineTo(width - 10, yZero + 4);
            ctx.fillStyle = '#94a3b8';
            ctx.fill();
        }
        
        // Y-axis
        const xZero = ((0 - xMin) / (xMax - xMin)) * width;
        if (xZero >= 0 && xZero <= width) {
            ctx.beginPath();
            ctx.moveTo(xZero, 0);
            ctx.lineTo(xZero, height);
            ctx.stroke();
            
            // Arrow
            ctx.beginPath();
            ctx.moveTo(xZero - 4, 10);
            ctx.lineTo(xZero, 0);
            ctx.lineTo(xZero + 4, 10);
            ctx.fill();
        }
        
        // Labels
        ctx.fillStyle = '#94a3b8';
        ctx.font = '10px Arial';
        ctx.fillText('x', width - 10, yZero - 5);
        ctx.fillText('y', xZero + 5, 15);
        
        ctx.restore();
    }
    
    function getNiceStep(range) {
        const roughStep = range / 8;
        const magnitude = Math.pow(10, Math.floor(Math.log10(roughStep)));
        const residual = roughStep / magnitude;
        if (residual < 1.5) return magnitude;
        if (residual < 3.5) return 2 * magnitude;
        if (residual < 7.5) return 5 * magnitude;
        return 10 * magnitude;
    }
    
    function zoomIn() {
        const centerX = (xMin + xMax) / 2;
        const centerY = (yMin + yMax) / 2;
        const newRange = (xMax - xMin) * 0.8;
        xMin = centerX - newRange / 2;
        xMax = centerX + newRange / 2;
        yMin = centerY - newRange / 2;
        yMax = centerY + newRange / 2;
        plotGraph();
    }
    
    function zoomOut() {
        const centerX = (xMin + xMax) / 2;
        const centerY = (yMin + yMax) / 2;
        const newRange = (xMax - xMin) * 1.25;
        xMin = centerX - newRange / 2;
        xMax = centerX + newRange / 2;
        yMin = centerY - newRange / 2;
        yMax = centerY + newRange / 2;
        plotGraph();
    }
    
    function resetView() {
        xMin = -5; xMax = 5;
        yMin = -5; yMax = 5;
        plotGraph();
        showMessage("View reset to default (-5 to 5)");
    }
    
    function toggleGrid() {
        showGrid = !showGrid;
        plotGraph();
        showMessage(showGrid ? "Grid visible" : "Grid hidden");
    }
    
    // Mouse hover coordinates
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const mouseX = (e.clientX - rect.left) * scaleX;
        const mouseY = (e.clientY - rect.top) * scaleY;
        
        const x = xMin + (mouseX / width) * (xMax - xMin);
        const y = yMax - (mouseY / height) * (yMax - yMin);
        
        document.getElementById('coordDisplay').innerHTML = `📍 (${x.toFixed(3)}, ${y.toFixed(3)})`;
    });
    
    // Keyboard support
    document.addEventListener('keydown', (e) => {
        const key = e.key;
        if (key >= '0' && key <= '9') insert(key);
        else if (key === '+' || key === '-' || key === '*' || key === '/') insert(key);
        else if (key === '.') insert('.');
        else if (key === '(' || key === ')') insert(key);
        else if (key === 'Enter') calculate();
        else if (key === 'Escape') clearDisplay();
        else if (key === 'Backspace') deleteLast();
        else if (key === '^') insert('^');
    });
    
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    plotGraph();
</script>
</body>
               </html>
