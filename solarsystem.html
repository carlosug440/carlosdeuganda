<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Interactive Solar System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
color:white;
font-family:Arial;
overflow:hidden;
}

.container{
display:flex;
height:100vh;
}

/* SOLAR SYSTEM AREA */

.solar-system{
flex:2;
position:relative;
display:flex;
align-items:center;
justify-content:center;
}

/* SUN */

.sun{
width:80px;
height:80px;
background:orange;
border-radius:50%;
box-shadow:0 0 40px orange;
position:absolute;
}

/* ORBITS */

.orbit{
position:absolute;
border:1px dashed rgba(255,255,255,0.2);
border-radius:50%;
animation:rotate linear infinite;
}

@keyframes rotate{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

/* PLANETS */

.planet{
width:18px;
height:18px;
border-radius:50%;
position:absolute;
top:-9px;
left:50%;
transform:translateX(-50%);
cursor:pointer;
}

/* PLANET COLORS */

.mercury{background:gray;}
.venus{background:#d4a373;}
.earth{background:#3a86ff;}
.mars{background:#e63946;}
.jupiter{background:#f4a261;}
.saturn{background:#e9c46a;}
.uranus{background:#90dbf4;}
.neptune{background:#4361ee;}

/* INFO PANEL */

.info{
flex:1;
background:#020617;
padding:20px;
overflow:auto;
}

.info h2{
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="solar-system">

<div class="sun"></div>

<!-- Mercury -->
<div class="orbit" style="width:120px;height:120px;animation-duration:5s;">
<div class="planet mercury" onclick="showPlanet('Mercury')"></div>
</div>

<!-- Venus -->
<div class="orbit" style="width:170px;height:170px;animation-duration:8s;">
<div class="planet venus" onclick="showPlanet('Venus')"></div>
</div>

<!-- Earth -->
<div class="orbit" style="width:220px;height:220px;animation-duration:10s;">
<div class="planet earth" onclick="showPlanet('Earth')"></div>
</div>

<!-- Mars -->
<div class="orbit" style="width:270px;height:270px;animation-duration:14s;">
<div class="planet mars" onclick="showPlanet('Mars')"></div>
</div>

<!-- Jupiter -->
<div class="orbit" style="width:340px;height:340px;animation-duration:20s;">
<div class="planet jupiter" onclick="showPlanet('Jupiter')"></div>
</div>

<!-- Saturn -->
<div class="orbit" style="width:410px;height:410px;animation-duration:25s;">
<div class="planet saturn" onclick="showPlanet('Saturn')"></div>
</div>

<!-- Uranus -->
<div class="orbit" style="width:480px;height:480px;animation-duration:30s;">
<div class="planet uranus" onclick="showPlanet('Uranus')"></div>
</div>

<!-- Neptune -->
<div class="orbit" style="width:550px;height:550px;animation-duration:35s;">
<div class="planet neptune" onclick="showPlanet('Neptune')"></div>
</div>

</div>


<div class="info">

<h2>Solar System</h2>

<p id="planetInfo">
Click a planet to see information.
</p>

</div>

</div>


<script>

const data={

Mercury:"Mercury is the closest planet to the Sun and the smallest planet in the solar system.",

Venus:"Venus is the hottest planet because of its thick atmosphere.",

Earth:"Earth is the only planet known to support life.",

Mars:"Mars is called the Red Planet and may have had water in the past.",

Jupiter:"Jupiter is the largest planet and has a giant storm called the Great Red Spot.",

Saturn:"Saturn is famous for its beautiful ring system.",

Uranus:"Uranus rotates on its side and appears blue due to methane.",

Neptune:"Neptune is the farthest planet and has extremely strong winds."

};

function showPlanet(name){

document.getElementById("planetInfo").innerText=data[name];

}

</script>

</body>
</html>
