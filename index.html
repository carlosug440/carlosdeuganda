<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carlos | Web Developer - Interactive Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        background: #ffffff;
        color: #1e293b;
        line-height: 1.6;
    }

    /* Color Scheme: White (#ffffff), Blue (#3b82f6), Yellow (#fbbf24) */
    :root {
        --primary-blue: #3b82f6;
        --primary-yellow: #fbbf24;
        --dark-bg: #f8fafc;
        --text-dark: #1e293b;
        --text-light: #64748b;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: #e2e8f0; }
    ::-webkit-scrollbar-thumb { background: var(--primary-blue); border-radius: 10px; }

    /* NAVBAR - JavaScript controlled */
    nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 8%;
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(10px);
        position: sticky;
        top: 0;
        z-index: 1000;
        box-shadow: 0 2px 20px rgba(0,0,0,0.05);
        transition: all 0.3s;
    }

    nav.scrolled {
        padding: 12px 8%;
        box-shadow: 0 4px 25px rgba(0,0,0,0.1);
    }

    nav h2 {
        color: var(--primary-blue);
        font-size: 28px;
        font-weight: 700;
        cursor: pointer;
    }

    nav ul {
        display: flex;
        gap: 35px;
        list-style: none;
    }

    nav a {
        text-decoration: none;
        color: var(--text-dark);
        font-weight: 500;
        transition: 0.3s;
        position: relative;
    }

    nav a::after {
        content: '';
        position: absolute;
        bottom: -5px;
        left: 0;
        width: 0%;
        height: 2px;
        background: var(--primary-yellow);
        transition: 0.3s;
    }

    nav a:hover::after,
    nav a.active::after {
        width: 100%;
    }

    nav a:hover,
    nav a.active {
        color: var(--primary-blue);
    }

    /* HERO SECTION */
    .hero {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 80px;
        padding: 80px 8%;
        flex-wrap: wrap;
        min-height: 85vh;
        background: linear-gradient(135deg, #ffffff 0%, #fef9e6 100%);
    }

    .hero-text {
        max-width: 550px;
    }

    .hero-text h1 {
        font-size: 56px;
        margin-bottom: 15px;
        font-weight: 700;
        line-height: 1.2;
        color: var(--text-dark);
    }

    .hero-text span {
        color: var(--primary-blue);
        position: relative;
        display: inline-block;
    }

    .hero-text p {
        margin-top: 15px;
        color: var(--text-light);
        font-size: 18px;
        line-height: 1.7;
    }

    .btn {
        margin-top: 30px;
        padding: 14px 38px;
        background: var(--primary-blue);
        border: none;
        border-radius: 50px;
        cursor: pointer;
        font-weight: 600;
        font-size: 16px;
        color: white;
        transition: 0.3s;
        box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
    }

    .btn:hover {
        transform: translateY(-3px);
        background: #2563eb;
        box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
    }

    .btn-outline {
        background: transparent;
        border: 2px solid var(--primary-blue);
        color: var(--primary-blue);
        margin-left: 15px;
    }

    .btn-outline:hover {
        background: var(--primary-blue);
        color: white;
    }

    /* Square Profile Image */
    .profile {
        width: 320px;
        height: 320px;
        overflow: hidden;
        border: 4px solid var(--primary-yellow);
        box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        background: linear-gradient(135deg, var(--primary-blue), var(--primary-yellow));
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.3s;
        border-radius: 20px;
    }

    .profile:hover {
        transform: scale(1.02);
        box-shadow: 0 25px 50px rgba(59, 130, 246, 0.2);
    }

    .profile img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* SECTIONS */
    section {
        padding: 80px 8%;
        text-align: center;
    }

    section h2 {
        font-size: 42px;
        margin-bottom: 50px;
        font-weight: 700;
        color: var(--text-dark);
        position: relative;
        display: inline-block;
    }

    section h2::after {
        content: '';
        position: absolute;
        bottom: -12px;
        left: 50%;
        transform: translateX(-50%);
        width: 80px;
        height: 4px;
        background: var(--primary-yellow);
        border-radius: 2px;
    }

    /* ABOUT SECTION - JavaScript animated */
    #about {
        background: var(--dark-bg);
        border-radius: 30px;
        margin: 20px 8%;
        padding: 60px;
    }

    #about p {
        max-width: 800px;
        margin: 0 auto;
        font-size: 18px;
        color: var(--text-light);
        line-height: 1.8;
    }

    /* SKILLS SECTION - Dynamic JavaScript bars */
    .skills-container {
        max-width: 800px;
        margin: auto;
    }

    .skill {
        margin: 30px 0;
        text-align: left;
        opacity: 0;
        transform: translateX(-30px);
        transition: all 0.5s ease;
    }

    .skill.visible {
        opacity: 1;
        transform: translateX(0);
    }

    .skill-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
        font-weight: 500;
    }

    .skill-name {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .skill-name i {
        color: var(--primary-blue);
        font-size: 20px;
    }

    .bar {
        background: #e2e8f0;
        height: 12px;
        border-radius: 10px;
        overflow: hidden;
    }

    .progress {
        height: 12px;
        background: linear-gradient(90deg, var(--primary-blue), var(--primary-yellow));
        border-radius: 10px;
        width: 0%;
        transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* PROJECTS CARDS - Dynamic JavaScript filtering */
    .project-filters {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-bottom: 40px;
        flex-wrap: wrap;
    }

    .filter-btn {
        padding: 8px 24px;
        background: transparent;
        border: 2px solid var(--primary-blue);
        border-radius: 50px;
        color: var(--primary-blue);
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
    }

    .filter-btn.active,
    .filter-btn:hover {
        background: var(--primary-blue);
        color: white;
    }

    .projects {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 30px;
        margin-top: 20px;
    }

    .card {
        background: white;
        padding: 30px 25px;
        border-radius: 20px;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        border: 1px solid #e2e8f0;
        text-align: center;
        cursor: pointer;
        color: var(--text-dark);
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        opacity: 0;
        transform: translateY(30px);
        animation: fadeInUp 0.5s forwards;
    }

    .card:hover {
        transform: translateY(-10px) scale(1.02);
        border-color: var(--primary-yellow);
        box-shadow: 0 20px 35px rgba(0, 0, 0, 0.1);
    }

    .card h3 {
        font-size: 24px;
        margin-bottom: 15px;
        color: var(--primary-blue);
        font-weight: 600;
    }

    .card p {
        color: var(--text-light);
        line-height: 1.6;
        font-size: 15px;
    }

    .card i {
        font-size: 48px;
        color: var(--primary-yellow);
        margin-bottom: 20px;
    }

    .projects a {
        text-decoration: none;
    }

    /* CONTACT SECTION - JavaScript form handling */
    .contact-container {
        max-width: 600px;
        margin: auto;
        background: white;
        padding: 40px;
        border-radius: 30px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        border: 1px solid #e2e8f0;
    }

    .input-group {
        position: relative;
        margin: 20px 0;
    }

    input, textarea {
        width: 100%;
        padding: 15px 20px;
        margin: 10px 0;
        border-radius: 12px;
        border: 2px solid #e2e8f0;
        background: white;
        color: var(--text-dark);
        font-size: 16px;
        transition: 0.3s;
    }

    input:focus, textarea:focus {
        outline: none;
        border-color: var(--primary-yellow);
        box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1);
    }

    /* FOOTER */
    footer {
        text-align: center;
        padding: 35px;
        background: var(--dark-bg);
        margin-top: 50px;
        border-top: 1px solid #e2e8f0;
    }

    footer p {
        color: var(--text-light);
    }

    /* Floating Buttons */
    .whatsapp, .phone {
        position: fixed;
        right: 25px;
        width: 55px;
        height: 55px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        color: white;
        text-decoration: none;
        transition: 0.3s;
        z-index: 999;
        cursor: pointer;
    }

    .whatsapp {
        bottom: 25px;
        background: linear-gradient(135deg, #25D366, #128C7E);
        box-shadow: 0 5px 20px rgba(37, 211, 102, 0.4);
    }

    .phone {
        bottom: 95px;
        background: linear-gradient(135deg, var(--primary-blue), #2563eb);
        box-shadow: 0 5px 20px rgba(59, 130, 246, 0.4);
    }

    .whatsapp:hover, .phone:hover {
        transform: scale(1.1);
    }

    /* Animations */
    @keyframes fadeInUp {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Typing Animation */
    .typing-text {
        border-right: 3px solid var(--primary-yellow);
        white-space: nowrap;
        overflow: hidden;
        display: inline-block;
    }

    @keyframes blink {
        50% { border-color: transparent; }
    }

    /* Toast Message */
    .toast-message {
        position: fixed;
        top: 100px;
        right: 20px;
        background: white;
        color: var(--text-dark);
        padding: 15px 25px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        border-left: 4px solid var(--primary-blue);
        z-index: 2000;
        transform: translateX(400px);
        transition: 0.3s;
        font-weight: 500;
    }

    .toast-message.show {
        transform: translateX(0);
    }

    @media (max-width: 768px) {
        nav { flex-direction: column; gap: 15px; }
        nav ul { gap: 20px; flex-wrap: wrap; justify-content: center; }
        .hero { flex-direction: column; text-align: center; gap: 40px; }
        .hero-text h1 { font-size: 36px; }
        section h2 { font-size: 32px; }
        .profile { width: 250px; height: 250px; }
        .typing-text { white-space: normal; border-right: none; }
    }
</style>
</head>
<body>

<nav id="navbar">
    <h2><i class="fas fa-code" style="color: #3b82f6;"></i> Carlos</h2>
    <ul id="navLinks">
        <li><a href="#home" data-section="home">Home</a></li>
        <li><a href="#about" data-section="about">About</a></li>
        <li><a href="#skills" data-section="skills">Skills</a></li>
        <li><a href="#projects" data-section="projects">Projects</a></li>
        <li><a href="#contact" data-section="contact">Contact</a></li>
    </ul>
</nav>

<!-- HERO -->
<div class="hero" id="home">
    <div class="hero-text">
        <h1>Hello, I'm <span id="typedName"></span></h1>
        <p><i class="fas fa-map-marker-alt" style="color: #3b82f6;"></i> Web Developer | Graphic Designer | Email Marketer | Youth Empowerment Advocate from Uganda</p>
        <p id="dynamicQuote"></p>
        <div>
            <button class="btn" id="viewWorkBtn"><i class="fas fa-arrow-down"></i> View My Work</button>
            <button class="btn btn-outline" id="contactBtn"><i class="fas fa-envelope"></i> Contact Me</button>
        </div>
    </div>
    <div class="profile">
        <img src="images/IMG_20240830_162436_3-1.jpg" alt="Carlos - Web Developer" id="profileImg">
    </div>
</div>

<!-- ABOUT -->
<section id="about">
    <h2>About Me</h2>
    <p id="aboutText"></p>
    <div id="statsContainer" style="display: flex; justify-content: center; gap: 40px; margin-top: 40px; flex-wrap: wrap;"></div>
</section>

<!-- SKILLS -->
<section id="skills">
    <h2>My Skills</h2>
    <div class="skills-container" id="skillsContainer"></div>
</section>

<!-- PROJECTS -->
<section id="projects">
    <h2>Featured Projects</h2>
    <div class="project-filters" id="projectFilters"></div>
    <div class="projects" id="projectsContainer"></div>
</section>

<!-- CONTACT -->
<section id="contact">
    <h2>Get In Touch</h2>
    <div class="contact-container">
        <form id="contactForm">
            <div class="input-group">
                <input type="text" id="contactName" placeholder="Your Name" required>
            </div>
            <div class="input-group">
                <input type="email" id="contactEmail" placeholder="Your Email" required>
            </div>
            <div class="input-group">
                <textarea id="contactMessage" rows="5" placeholder="Your Message" required></textarea>
            </div>
            <button type="submit" class="btn contact-btn" id="sendBtn"><i class="fas fa-paper-plane"></i> Send Message</button>
        </form>
        <div id="formStatus" style="margin-top: 15px; font-size: 14px;"></div>
    </div>
</section>

<footer>
    <p><i class="fas fa-heart" style="color: #fbbf24;"></i> © 2026 Carlos | Uganda <i class="fas fa-code"></i> Building digital solutions with passion</p>
</footer>

<!-- FLOATING BUTTONS -->
<div class="whatsapp" id="whatsappBtn"><i class="fab fa-whatsapp"></i></div>
<div class="phone" id="phoneBtn"><i class="fas fa-phone-alt"></i></div>

<script>
    // ============================================
    // JAVASCRIPT IS THE HEART - All dynamic content
    // ============================================

    // Data Store
    const portfolioData = {
        name: "Carlos De Uganda",
        about: "I'm a passionate technologist and digital creator dedicated to empowering young people with essential digital skills. With expertise in web development, graphic design, and digital marketing, I help businesses establish strong online presence. My mission is to bridge the digital divide by providing modern, responsive, and user-friendly solutions that drive growth and success in the digital age.",
        stats: [
            { value: "50+", label: "Projects Completed" },
            { value: "30+", label: "Happy Clients" },
            { value: "5+", label: "Years Experience" },
            { value: "100+", label: "Students Trained" }
        ],
        quotes: [
            "Code is poetry in motion",
            "Building dreams one line at a time",
            "Empowering youth through technology",
            "Creativity meets functionality"
        ],
        skills: [
            { name: "HTML5", icon: "fab fa-html5", level: 95, color: "#e34c26" },
            { name: "CSS3", icon: "fab fa-css3-alt", level: 90, color: "#264de4" },
            { name: "JavaScript", icon: "fab fa-js", level: 88, color: "#f7df1e" },
            { name: "Graphic Design", icon: "fas fa-palette", level: 85, color: "#fbbf24" },
            { name: "Email Marketing", icon: "fas fa-envelope", level: 82, color: "#3b82f6" },
            { name: "Social Media Management", icon: "fas fa-chart-line", level: 80, color: "#10b981" }
        ],
        projects: [
            { id: 1, name: "Spending Tracker", category: "web", icon: "fas fa-chart-pie", desc: "Track expenses and export data to spreadsheets", link: "spending-tracker.html" },
            { id: 2, name: "JavaScript Calculator", category: "web", icon: "fas fa-calculator", desc: "Interactive calculator with advanced functions", link: "calculator.html" },
            { id: 3, name: "Digital Clock", category: "web", icon: "fas fa-clock", desc: "Clock with moon phases and timezone settings", link: "clock.html" },
            { id: 4, name: "Solar System", category: "3d", icon: "fas fa-solar-panel", desc: "3D visualization of planets and orbits", link: "solarsystem.html" },
            { id: 5, name: "Digital Compass", category: "tool", icon: "fas fa-compass", desc: "Magnetic north detection compass", link: "compass.html" },
            { id: 6, name: "Unit Converter", category: "tool", icon: "fas fa-exchange-alt", desc: "Convert between metric and imperial units", link: "converter.html" }
        ]
    };

    let currentFilter = "all";
    let quoteIndex = 0;

    // DOM Elements
    const typedNameEl = document.getElementById('typedName');
    const aboutTextEl = document.getElementById('aboutText');
    const statsContainer = document.getElementById('statsContainer');
    const skillsContainer = document.getElementById('skillsContainer');
    const projectsContainer = document.getElementById('projectsContainer');
    const projectFilters = document.getElementById('projectFilters');
    const dynamicQuote = document.getElementById('dynamicQuote');
    const contactForm = document.getElementById('contactForm');
    const viewWorkBtn = document.getElementById('viewWorkBtn');
    const contactBtn = document.getElementById('contactBtn');
    const whatsappBtn = document.getElementById('whatsappBtn');
    const phoneBtn = document.getElementById('phoneBtn');
    const navbar = document.getElementById('navbar');
    const navLinks = document.querySelectorAll('#navLinks a');

    // ========== TYPING ANIMATION ==========
    function typeWriter(element, text, speed = 100) {
        let i = 0;
        element.classList.add('typing-text');
        element.innerHTML = '';
        function type() {
            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                i++;
                setTimeout(type, speed);
            } else {
                element.classList.remove('typing-text');
                element.style.borderRight = 'none';
            }
        }
        type();
    }

    // ========== DYNAMIC QUOTE ROTATOR ==========
    function rotateQuotes() {
        setInterval(() => {
            quoteIndex = (quoteIndex + 1) % portfolioData.quotes.length;
            dynamicQuote.style.opacity = '0';
            setTimeout(() => {
                dynamicQuote.innerHTML = `<i class="fas fa-quote-left"></i> ${portfolioData.quotes[quoteIndex]}`;
                dynamicQuote.style.opacity = '1';
            }, 300);
        }, 5000);
    }

    // ========== RENDER STATS ==========
    function renderStats() {
        statsContainer.innerHTML = portfolioData.stats.map(stat => `
            <div style="text-align: center; animation: fadeInUp 0.5s forwards;">
                <h3 style="font-size: 36px; color: #3b82f6; font-weight: 800;">${stat.value}</h3>
                <p style="color: #64748b;">${stat.label}</p>
            </div>
        `).join('');
    }

    // ========== RENDER SKILLS WITH SCROLL ANIMATION ==========
    function renderSkills() {
        skillsContainer.innerHTML = portfolioData.skills.map((skill, index) => `
            <div class="skill" data-skill-index="${index}" style="transition-delay: ${index * 0.1}s">
                <div class="skill-header">
                    <span class="skill-name"><i class="${skill.icon}"></i> ${skill.name}</span>
                    <span>${skill.level}%</span>
                </div>
                <div class="bar">
                    <div class="progress" data-level="${skill.level}" style="width: 0%"></div>
                </div>
            </div>
        `).join('');
        
        // Animate skills on scroll
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const skillDiv = entry.target;
                    const progress = skillDiv.querySelector('.progress');
                    const level = progress.getAttribute('data-level');
                    setTimeout(() => {
                        progress.style.width = `${level}%`;
                    }, 100);
                    skillDiv.classList.add('visible');
                }
            });
        }, { threshold: 0.3 });
        
        document.querySelectorAll('.skill').forEach(skill => observer.observe(skill));
    }

    // ========== RENDER PROJECTS WITH FILTERING ==========
    function renderProjects(filter = "all") {
        const filtered = filter === "all" ? portfolioData.projects : portfolioData.projects.filter(p => p.category === filter);
        projectsContainer.innerHTML = filtered.map((project, idx) => `
            <a href="${project.link}" style="text-decoration: none;">
                <div class="card" style="animation-delay: ${idx * 0.05}s">
                    <i class="${project.icon}"></i>
                    <h3>${project.name}</h3>
                    <p>${project.desc}</p>
                </div>
            </a>
        `).join('');
    }

    // ========== RENDER FILTER BUTTONS ==========
    function renderFilters() {
        const categories = ["all", ...new Set(portfolioData.projects.map(p => p.category))];
        const categoryNames = { all: "All Projects", web: "Web Apps", "3d": "3D & Visual", tool: "Tools" };
        
        projectFilters.innerHTML = categories.map(cat => `
            <button class="filter-btn ${currentFilter === cat ? 'active' : ''}" data-filter="${cat}">
                ${categoryNames[cat] || cat}
            </button>
        `).join('');
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentFilter = btn.dataset.filter;
                renderFilters();
                renderProjects(currentFilter);
            });
        });
    }

    // ========== ACTIVE NAVIGATION HIGHLIGHT ==========
    function updateActiveNav() {
        const sections = document.querySelectorAll('section, .hero');
        const scrollPos = window.scrollY + 150;
        
        sections.forEach(section => {
            const sectionTop = section.offsetTop;
            const sectionBottom = sectionTop + section.offsetHeight;
            const sectionId = section.id || 'home';
            
            if (scrollPos >= sectionTop && scrollPos < sectionBottom) {
                navLinks.forEach(link => {
                    link.classList.remove('active');
                    if (link.getAttribute('data-section') === sectionId) {
                        link.classList.add('active');
                    }
                });
            }
        });
    }

    // ========== SCROLL ANIMATION FOR NAVBAR ==========
    function handleNavbarScroll() {
        if (window.scrollY > 50) {
            navbar.classList.add('scrolled');
        } else {
            navbar.classList.remove('scrolled');
        }
    }

    // ========== TOAST NOTIFICATION ==========
    function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.style.borderLeftColor = type === 'success' ? '#3b82f6' : '#ef4444';
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        
        setTimeout(() => toast.classList.add('show'), 100);
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 300);
        }, 4000);
    }

    // ========== FORM SUBMISSION ==========
    contactForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('contactName').value;
        const email = document.getElementById('contactEmail').value;
        const message = document.getElementById('contactMessage').value;
        const sendBtn = document.getElementById('sendBtn');
        
        if (!name || !email || !message) {
            showToast('Please fill in all fields', 'error');
            return;
        }
        
        const originalText = sendBtn.innerHTML;
        sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
        sendBtn.disabled = true;
        
        // Simulate API call (replace with actual endpoint)
        setTimeout(() => {
            showToast(`Thanks ${name}! Message sent successfully. I'll reply soon.`, 'success');
            contactForm.reset();
            sendBtn.innerHTML = originalText;
            sendBtn.disabled = false;
        }, 1500);
    });

    // ========== SMOOTH SCROLL ==========
    function smoothScroll(targetId) {
        const target = document.getElementById(targetId) || document.querySelector(targetId);
        if (target) {
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    }

    // ========== EVENT LISTENERS ==========
    viewWorkBtn.addEventListener('click', () => smoothScroll('projects'));
    contactBtn.addEventListener('click', () => smoothScroll('contact'));
    whatsappBtn.addEventListener('click', () => window.open('https://wa.me/+256707071929', '_blank'));
    phoneBtn.addEventListener('click', () => window.location.href = 'tel:+256707071929');
    
    navLinks.forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            const section = link.getAttribute('data-section');
            smoothScroll(section);
        });
    });

    // ========== INITIALIZE EVERYTHING ==========
    function init() {
        typeWriter(typedNameEl, portfolioData.name, 80);
        aboutTextEl.textContent = portfolioData.about;
        dynamicQuote.innerHTML = `<i class="fas fa-quote-left"></i> ${portfolioData.quotes[0]}`;
        renderStats();
        renderSkills();
        renderFilters();
        renderProjects("all");
        rotateQuotes();
        
        window.addEventListener('scroll', () => {
            updateActiveNav();
            handleNavbarScroll();
        });
        updateActiveNav();
        handleNavbarScroll();
        
        // Handle profile image error
        const profileImg = document.getElementById('profileImg');
        profileImg.onerror = () => {
            profileImg.src = 'https://via.placeholder.com/320x320?text=Carlos';
        };
    }
    
    init();
</script>
